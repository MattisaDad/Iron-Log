  <!-- Storage: IndexedDB primary (most persistent on iOS), localStorage fallback -->
  <script>
    (function() {
      const DB_NAME = 'IronLogDB';
      const STORE   = 'kv';
      let db = null;

      function openDB() {
        return new Promise((res, rej) => {
          if (db) return res(db);
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
          req.onsuccess = e => { db = e.target.result; res(db); };
          req.onerror   = () => rej(req.error);
        });
      }

      function idbGet(key) {
        return openDB().then(db => new Promise((res, rej) => {
          const tx  = db.transaction(STORE, 'readonly');
          const req = tx.objectStore(STORE).get(key);
          req.onsuccess = () => res(req.result);
          req.onerror   = () => rej(req.error);
        }));
      }

      function idbSet(key, value) {
        return openDB().then(db => new Promise((res, rej) => {
          const tx  = db.transaction(STORE, 'readwrite');
          const req = tx.objectStore(STORE).put(value, key);
          req.onsuccess = () => res();
          req.onerror   = () => rej(req.error);
        }));
      }

      function idbDelete(key) {
        return openDB().then(db => new Promise((res, rej) => {
          const tx  = db.transaction(STORE, 'readwrite');
          const req = tx.objectStore(STORE).delete(key);
          req.onsuccess = () => res();
          req.onerror   = () => rej(req.error);
        }));
      }

      function idbKeys() {
        return openDB().then(db => new Promise((res, rej) => {
          const tx  = db.transaction(STORE, 'readonly');
          const req = tx.objectStore(STORE).getAllKeys();
          req.onsuccess = () => res(req.result);
          req.onerror   = () => rej(req.error);
        }));
      }

      window.storage = {
        get: async (key) => {
          // Try IndexedDB first
          try {
            const val = await idbGet('ironlog_' + key);
            if (val !== undefined) return { key, value: val };
          } catch(e) {}
          // Fallback to localStorage
          const lsVal = localStorage.getItem('ironlog_' + key);
          if (lsVal !== null) return { key, value: lsVal };
          throw new Error('not found');
        },
        set: async (key, value) => {
          // Write to both for redundancy
          try { await idbSet('ironlog_' + key, value); } catch(e) {}
          try { localStorage.setItem('ironlog_' + key, value); } catch(e) {}
          return { key, value };
        },
        delete: async (key) => {
          try { await idbDelete('ironlog_' + key); } catch(e) {}
          try { localStorage.removeItem('ironlog_' + key); } catch(e) {}
          return { key, deleted: true };
        },
        list: async (prefix) => {
          try {
            const all = await idbKeys();
            const keys = all.filter(k => k.startsWith('ironlog_' + (prefix||'')))
                            .map(k => k.replace('ironlog_',''));
            return { keys };
          } catch(e) {
            const keys = Object.keys(localStorage)
              .filter(k => k.startsWith('ironlog_' + (prefix||'')))
              .map(k => k.replace('ironlog_',''));
            return { keys };
          }
        }
      };
    })();
  </script>

const ALL_GROUPS = Object.keys(MUSCLE_GROUPS);
const COMPOUND_SETS = 4; const ISOLATION_SETS = 3;
const COMPOUND_REPS = "6–10"; const ISOLATION_REPS = "10–15";
const DEFAULT_BIG3  = { sets: 4, repRange: "6–10" };

// ─── Session Builder ───────────────────────────────────────────────────────────
function buildSession(selectedGroups, selectedBigThree, allLogs, customPrograms, customExercises={}) {
  let exercises = [];

  // Big Three go FIRST, always
  selectedBigThree.forEach(key => {
    const cfg  = BIG_THREE[key];
    const prog = customPrograms[key] || null;
    const history = allLogs[cfg.lift] || [];
    let suggestion = null;
    if (!prog && history.length > 0) {
      const last = history[history.length - 1];
      const ls = last.sets || [];
      if (ls.length > 0) {
        const lw = parseFloat(ls[0]?.weight)||0, lr = parseInt(ls[0]?.reps)||0;
        const topped = ls.every(s => parseInt(s.reps) >= 10);
        if (topped && lw > 0) suggestion = { weight: lw+5, repRange: COMPOUND_REPS, note: `↑ 5lbs — hit top of range at ${lw}lbs` };
        else if (lw > 0)      suggestion = { weight: lw, repRange: `${lr+1}–10`, note: `Push for more reps at ${lw}lbs` };
      }
    }
    exercises.push({
      name:    cfg.lift,
      compound: true,
      group:   cfg.group,
      alts:    cfg.alts,
      sets:    prog ? prog.sets    : DEFAULT_BIG3.sets,
      repRange:prog ? prog.repRange: DEFAULT_BIG3.repRange,
      customProgram: prog,
      suggestion,
      isBigThree: true,
    });
  });

  // Then muscle group exercises
  const TARGET_REMAINING_MIN = Math.max(0, 14 - exercises.reduce((a,e)=>a+e.sets,0));
  const TARGET_REMAINING_MAX = Math.max(0, 17 - exercises.reduce((a,e)=>a+e.sets,0));

  selectedGroups.forEach(group => {
    const baseEx = MUSCLE_GROUPS[group].exercises;
    const userEx = (customExercises[group]||[]).filter(c=>!baseEx.find(b=>b.name===c.name));
    const ex = [...baseEx, ...userEx];
    const compounds  = [...ex.filter(e=>e.compound)].sort((a,b)=>a.priority-b.priority);
    const isolations = [...ex.filter(e=>!e.compound)].sort((a,b)=>a.priority-b.priority);
    const isFocused  = (selectedGroups.length + selectedBigThree.length) <= 2;
    const nC = isFocused ? Math.min(2,compounds.length)  : Math.min(1,compounds.length);
    const nI = isFocused ? Math.min(2,isolations.length) : Math.min(1,isolations.length);
    const score = e => (allLogs[e.name]?.length||0)*10 - e.priority;
    compounds.sort((a,b)=>score(b)-score(a)).slice(0,nC).forEach(e=>
      exercises.push({...e,group,sets:COMPOUND_SETS,repRange:COMPOUND_REPS,customProgram:null,isBigThree:false,suggestion:getSuggestion(e,allLogs,true)})
    );
    isolations.sort((a,b)=>score(b)-score(a)).slice(0,nI).forEach(e=>
      exercises.push({...e,group,sets:ISOLATION_SETS,repRange:ISOLATION_REPS,customProgram:null,isBigThree:false,suggestion:getSuggestion(e,allLogs,false)})
    );
  });

  // Trim to max
  let totalSets = exercises.reduce((a,e)=>a+e.sets,0);
  const bigThreeSets = exercises.filter(e=>e.isBigThree).reduce((a,e)=>a+e.sets,0);
  while (totalSets > 17 && exercises.length > selectedBigThree.length + selectedGroups.length) {
    const last = exercises[exercises.length-1];
    if (last.isBigThree) break;
    exercises.pop(); totalSets -= last.sets;
  }

  return { exercises, totalSets, estMinutes: Math.round(totalSets * 3.5) };
}

function getSuggestion(ex, allLogs, isCompound) {
  const history = allLogs[ex.name]||[];
  if (!history.length) return null;
  const last = history[history.length-1]; const ls = last.sets||[];
  if (!ls.length) return null;
  const lw=parseFloat(ls[0]?.weight)||0, lr=parseInt(ls[0]?.reps)||0;
  const topped=ls.every(s=>parseInt(s.reps)>=(isCompound?10:15));
  if (topped&&lw>0) { const inc=isCompound?5:2.5; return {weight:lw+inc,repRange:isCompound?COMPOUND_REPS:ISOLATION_REPS,note:`↑ ${inc}lbs — hit top of range at ${lw}lbs`}; }
  if (lw>0) return {weight:lw,repRange:isCompound?`${lr+1}–10`:`${lr+1}–15`,note:`Push for more reps at ${lw}lbs`};
  return null;
}

function findExercise(name) {
  for (const [group,data] of Object.entries(MUSCLE_GROUPS)) {
    const f=data.exercises.find(e=>e.name===name);
    if(f) return {...f,group};
  }
  // check big three
  for (const [key,cfg] of Object.entries(BIG_THREE)) {
    if (cfg.lift===name) return {name:cfg.lift,compound:true,group:cfg.group,alts:cfg.alts};
  }
  return null;
}

// ─── Rest Timer ───────────────────────────────────────────────────────────────
function RestTimer({ isCompound, onDone }) {
  const REST = isCompound ? 120 : 75;
  const [seconds, setSeconds] = useState(REST);
  const ref = useRef(null);
  useEffect(()=>{
    ref.current=setInterval(()=>{
      setSeconds(s=>{if(s<=1){clearInterval(ref.current);onDone();return 0;}return s-1;});
    },1000);
    return()=>clearInterval(ref.current);
  },[]);
  const pct=(seconds/REST)*100;
  const color=seconds>REST*.5?"#22c55e":seconds>REST*.25?"#f59e0b":"#ef4444";
  const display=seconds>=60?`${Math.floor(seconds/60)}:${(seconds%60).toString().padStart(2,"0")}`:`${seconds}s`;
  return (
    <div style={{textAlign:"center",padding:"16px 0"}}>
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="48" fill="none" stroke="#1a1a2a" strokeWidth="8"/>
        <circle cx="55" cy="55" r="48" fill="none" stroke={color} strokeWidth="8"
          strokeDasharray={`${2*Math.PI*48}`} strokeDashoffset={`${2*Math.PI*48*(1-pct/100)}`}
          strokeLinecap="round" style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%",transition:"stroke-dashoffset 1s linear,stroke 0.4s"}}/>
        <text x="55" y="62" textAnchor="middle" fill={color} fontSize="24" fontFamily="Bebas Neue,sans-serif" letterSpacing="1">{display}</text>
      </svg>
      <div style={{color:"#44445a",fontSize:"0.72rem",marginTop:4}}>{isCompound?"2 min rest":"75s rest"}</div>
      <button onClick={onDone} style={{marginTop:12,padding:"7px 20px",background:"#1a1a2a",border:"1px solid #2a2a40",borderRadius:8,color:"#666",fontSize:"0.76rem",cursor:"pointer",fontFamily:"DM Sans,sans-serif",fontWeight:700}}>Skip Rest</button>
    </div>
  );
}

        <div style={{width:36,height:4,background:"#2a2a40",borderRadius:4,margin:"0 auto 18px"}}/>
        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"#3a3a58",marginBottom:6}}>Swap Exercise</div>

        <div style={{fontSize:"0.75rem",color:"#44445a",marginBottom:18}}>Equipment busy? Pick an alternative targeting the same muscle.</div>
        {alts.length===0?<div style={{color:"#3a3a58",fontSize:"0.85rem",textAlign:"center",padding:"20px 0"}}>No alternatives listed.</div>
          :alts.map((alt,i)=>{
            const ae=findExercise(alt);
            const gc=MUSCLE_GROUPS[ae?.group]?.color||BIG_THREE[ae?.key]?.color||"#888";
            return (
              <button key={i} onClick={()=>onSwap(alt)} style={{width:"100%",display:"flex",alignItems:"center",gap:13,background:"#14141f",border:"1.5px solid #1e1e2e",borderRadius:13,padding:"13px 14px",marginBottom:9,cursor:"pointer",textAlign:"left"}}>
                <div style={{width:38,height:38,borderRadius:10,background:`color-mix(in srgb,${gc} 14%,#10101c)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",flexShrink:0}}>
                  {MUSCLE_GROUPS[ae?.group]?.icon||"🔄"}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:"0.9rem",color:"#ddddf0",fontFamily:"DM Sans,sans-serif"}}>{alt}</div>
                  <div style={{fontSize:"0.65rem",color:"#3a3a58",marginTop:2,fontFamily:"DM Sans,sans-serif"}}>{ae?.compound?"Compound":"Isolation"} · {ae?.group||""}</div>
                </div>
                <div style={{color:"#3a3a58"}}>→</div>
              </button>
            );
          })}
        <button onClick={onClose} style={{width:"100%",padding:"13px",background:"#14141f",border:"1px solid #1e1e2e",borderRadius:12,color:"#44445a",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.85rem",cursor:"pointer",marginTop:4}}>Keep Current</button>
      </div>
    </div>
  );
}

// ─── Program Sheet ────────────────────────────────────────────────────────────
// Round to nearest 2.5lbs (standard plate math)
function roundToPlate(lbs) { return Math.round(lbs / 2.5) * 2.5; }

function ProgramSheet({ b3key, existing, onSave, onDelete, onClose }) {
  const cfg = BIG_THREE[b3key];
  const [useCustom,  setUseCustom]  = useState(!!existing);
  const [name,       setName]       = useState(existing?.name||"");
  const [sets,       setSets]       = useState(existing?.sets?.toString()||"5");
  const [repRange,   setRepRange]   = useState(existing?.repRange||"5");
  const [note,       setNote]       = useState(existing?.note||"");
  // 1RM + percentage
  const [oneRM,      setOneRM]      = useState(existing?.oneRM?.toString()||"");
  const [pct,        setPct]        = useState(existing?.pct?.toString()||"");
  const [confirmDel, setConfirmDel] = useState(false);

  const oneRMval  = parseFloat(oneRM);
  const pctVal    = parseFloat(pct);
  const calcWeight = (oneRMval > 0 && pctVal > 0)
    ? roundToPlate(oneRMval * (pctVal / 100))
    : null;

  const canSave = !useCustom || (name.trim() && parseInt(sets) > 0 && repRange.trim());

  function handleSave() {
    if (!useCustom) { onDelete(); return; }
    onSave({
      name:     name.trim(),
      sets:     parseInt(sets),
      repRange: repRange.trim(),
      note:     note.trim(),
      oneRM:    oneRMval > 0 ? oneRMval : null,
      pct:      pctVal  > 0 ? pctVal   : null,
      calcWeight,
    });
  }

  const inputStyle = { width:"100%", background:"#0c0c18", border:"1.5px solid #18182c", borderRadius:11, color:"#eeeef5", fontFamily:"DM Sans,sans-serif", fontSize:"1.1rem", fontWeight:700, padding:"11px 10px", textAlign:"center" };
  const labelStyle = { fontSize:"0.6rem", fontWeight:700, color:"#3a3a58", textTransform:"uppercase", letterSpacing:"0.09em", marginBottom:5 };

  return (
    <div style={{position:"fixed",inset:0,zIndex:100,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.72)",backdropFilter:"blur(4px)"}} onClick={onClose}/>
      {/* Scrollable inner sheet */}
      <div style={{position:"relative",background:"#0e0e1c",borderRadius:"20px 20px 0 0",border:"1px solid #1e1e30",maxWidth:480,margin:"0 auto",width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{padding:"20px 18px 36px"}}>
          <div style={{width:36,height:4,background:"#2a2a40",borderRadius:4,margin:"0 auto 16px"}}/>
          <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"#3a3a58",marginBottom:4}}>Programming</div>
          <div style={{fontWeight:700,fontSize:"1.05rem",color:"#eeeef5",marginBottom:16}}>{cfg.icon} {b3key}</div>

          {/* Default vs Custom toggle */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:18}}>
            {[
              [false,"⚡","Default","4 × 6–10"],
              [true, "📋","Custom Program","your scheme"],
            ].map(([val,icon,label,sub])=>(
              <button key={label} onClick={()=>setUseCustom(val)}
                style={{padding:"11px",borderRadius:11,border:`1.5px solid ${useCustom===val?"#f59e0b":"#1e1e2e"}`,background:useCustom===val?"#f59e0b0e":"#14141f",color:useCustom===val?"#f59e0b":"#44445a",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.82rem",cursor:"pointer",transition:"all .15s"}}>
                <div style={{fontSize:"1rem",marginBottom:3}}>{icon}</div>
                {label}
                <div style={{fontSize:"0.65rem",opacity:.7,marginTop:2}}>{sub}</div>
              </button>
            ))}
          </div>

          {useCustom && !confirmDel && (
            <>
              {/* Program name */}
              <div style={{marginBottom:12}}>
                <div style={labelStyle}>Program Name</div>
                <input value={name} onChange={e=>setName(e.target.value)}
                  placeholder="e.g. 5/3/1, GZCLP, Starting Strength..."
                  style={{...inputStyle, fontSize:"0.95rem", textAlign:"left", padding:"11px 13px", fontWeight:400}}/>
              </div>

              {/* Sets + Reps */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div>
                  <div style={labelStyle}>Sets</div>
                  <input type="number" inputMode="decimal" value={sets} onChange={e=>setSets(e.target.value)} placeholder="5" style={inputStyle}/>
                </div>
                <div>
                  <div style={labelStyle}>Reps / Scheme</div>
                  <input value={repRange} onChange={e=>setRepRange(e.target.value)} placeholder="e.g. 5, 3/3/1" style={inputStyle}/>
                </div>
              </div>

              {/* Divider */}
              <div style={{display:"flex",alignItems:"center",gap:10,margin:"16px 0 14px"}}>
                <div style={{flex:1,height:1,background:"#1a1a2a"}}/>
                <div style={{fontSize:"0.62rem",fontWeight:700,color:"#3a3a58",letterSpacing:"0.1em",textTransform:"uppercase"}}>1RM Weight Calculator</div>
                <div style={{flex:1,height:1,background:"#1a1a2a"}}/>
              </div>
              <div style={{fontSize:"0.75rem",color:"#3a3a58",marginBottom:12,lineHeight:1.55}}>
                Optional — enter your 1 rep max and a percentage to auto-calculate your working weight. Great for 5/3/1, Wendler, and percentage-based programs.
              </div>

              {/* 1RM + Percentage inputs */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <div>
                  <div style={labelStyle}>My 1RM (lbs)</div>
                  <input type="number" inputMode="decimal" value={oneRM} onChange={e=>setOneRM(e.target.value)}
                    placeholder="e.g. 140" style={inputStyle}/>
                </div>
                <div>
                  <div style={labelStyle}>Percentage (%)</div>
                  <input type="number" inputMode="decimal" value={pct} onChange={e=>setPct(e.target.value)}
                    placeholder="e.g. 75" style={inputStyle}/>
                </div>
              </div>

              {/* Live calculated weight display */}
              {calcWeight !== null ? (
                <div style={{background:"linear-gradient(135deg,#f59e0b12,#ef444412)",border:"1px solid #f59e0b33",borderRadius:13,padding:"14px 16px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontSize:"0.62rem",fontWeight:700,color:"#f59e0b88",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}}>Working Weight</div>
                    <div style={{fontSize:"0.78rem",color:"#f59e0b77"}}>
                      {pct}% of {oneRM}lbs 1RM
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"2.2rem",color:"#f59e0b",lineHeight:1}}>{calcWeight}</div>
                    <div style={{fontSize:"0.65rem",color:"#f59e0b66",letterSpacing:"0.08em"}}>LBS · rounded to 2.5</div>
                  </div>
                </div>
              ) : (oneRM || pct) ? (
                <div style={{background:"#14141f",border:"1px solid #1e1e2e",borderRadius:13,padding:"12px 16px",marginBottom:14,fontSize:"0.78rem",color:"#3a3a58",textAlign:"center"}}>
                  Enter both 1RM and percentage to calculate weight
                </div>
              ) : (
                <div style={{background:"#0e0e18",border:"1px dashed #1e1e2e",borderRadius:13,padding:"12px 16px",marginBottom:14,fontSize:"0.78rem",color:"#28284a",textAlign:"center"}}>
                  Working weight will appear here
                </div>
              )}

              {/* Notes */}
              <div style={{marginBottom:16}}>
                <div style={labelStyle}>Notes (optional)</div>
                <input value={note} onChange={e=>setNote(e.target.value)}
                  placeholder="e.g. Week 2 of cycle, 90% training max..."
                  style={{...inputStyle, fontSize:"0.88rem", textAlign:"left", padding:"11px 13px", fontWeight:400}}/>
              </div>

              {existing && (
                <button onClick={()=>setConfirmDel(true)}
                  style={{width:"100%",padding:"10px",background:"#1a0a0a",border:"1px solid #ef444422",borderRadius:10,color:"#ef444466",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.78rem",cursor:"pointer",marginBottom:10}}>
                  Remove Custom Program
                </button>
              )}
            </>
          )}

          {useCustom && confirmDel && (
            <div style={{background:"#1a0a0a",border:"1px solid #ef444433",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
              <div style={{fontSize:"0.85rem",color:"#ef4444aa",fontWeight:600,marginBottom:12}}>Remove custom program? This lift will use default sets/reps.</div>
              <div style={{display:"flex",gap:9}}>
                <button onClick={onDelete} style={{flex:1,padding:"10px",background:"#ef444422",border:"1px solid #ef444444",borderRadius:10,color:"#ef4444",fontWeight:700,fontSize:"0.82rem",cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Yes, Remove</button>
                <button onClick={()=>setConfirmDel(false)} style={{flex:1,padding:"10px",background:"#14141f",border:"1px solid #1e1e2e",borderRadius:10,color:"#44445a",fontWeight:700,fontSize:"0.82rem",cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Cancel</button>
              </div>
            </div>
          )}

          {!confirmDel && (
            <>
              <button disabled={!canSave} onClick={handleSave}
                style={{width:"100%",padding:"14px",border:"none",borderRadius:12,background:canSave?"linear-gradient(135deg,#f59e0b,#ef4444)":"#14141f",color:canSave?"#fff":"#2a2a40",fontFamily:"Bebas Neue,sans-serif",fontSize:"1.15rem",letterSpacing:"0.1em",cursor:canSave?"pointer":"default",marginBottom:8}}>
                {useCustom ? "Save Program" : "Use Default"}
              </button>
              <button onClick={onClose}
                style={{width:"100%",padding:"12px",background:"#14141f",border:"1px solid #1e1e2e",borderRadius:12,color:"#44445a",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.83rem",cursor:"pointer"}}>
                Cancel
              </button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function GymTracker() {
  const [screen, setScreen]                     = useState("home");
  const [selectedGroups, setSelectedGroups]     = useState([]);
  const [selectedBigThree, setSelectedBigThree] = useState([]); // keys e.g. ["Bench Press"]
  const [session, setSession]                   = useState(null);
  const [activeExIdx, setActiveExIdx]           = useState(0);
  const [activeSetIdx, setActiveSetIdx]         = useState(0);
  const [resting, setResting]                   = useState(false);
  const [setInputs, setSetInputs]               = useState({});
  const [allLogs, setAllLogs]                   = useState({});
  const [prs, setPrs]                           = useState({});
  const [customPrograms, setCustomPrograms]     = useState({}); // keyed by b3key e.g. "Bench Press"
  const [historyFilter, setHistoryFilter]       = useState("All");
  const [sessionComplete, setSessionComplete]   = useState(false);
  const [newPRs, setNewPRs]                     = useState([]);
  const [swapIdx, setSwapIdx]                   = useState(null);
  const [programKey, setProgramKey]             = useState(null);
  const [customExercises, setCustomExercises]   = useState({});
  const [editExIdx, setEditExIdx]               = useState(null);
  const [importText, setImportText]             = useState("");
  const [importStatus, setImportStatus]         = useState(null); // "ok" | "error" | null
  const [showImport, setShowImport]             = useState(false);

  useEffect(()=>{
    async function load(){
      try{
        const l=await window.storage.get("gym_logs_v4");
        const p=await window.storage.get("gym_prs_v4");
        const c=await window.storage.get("gym_progs_v4");
        const x=await window.storage.get("gym_custom_ex_v4");
        if(l) setAllLogs(JSON.parse(l.value));
        if(p) setPrs(JSON.parse(p.value));
        if(c) setCustomPrograms(JSON.parse(c.value));
        if(x) setCustomExercises(JSON.parse(x.value));
      }catch(e){}
    }
    load();
  },[]);

  async function saveProgram(key, prog) {
    const updated={...customPrograms,[key]:prog};
    setCustomPrograms(updated); setProgramKey(null);
    try{await window.storage.set("gym_progs_v4",JSON.stringify(updated));}catch(e){}
  }
  async function deleteProgram(key) {
    const updated={...customPrograms}; delete updated[key];
    setCustomPrograms(updated); setProgramKey(null);
    try{await window.storage.set("gym_progs_v4",JSON.stringify(updated));}catch(e){}
  }

  // Save a user-typed exercise into the permanent bank for a group
  async function saveCustomExercise(group, name, isCompound) {
    const entry = { name, compound: isCompound, priority: 999, alts: [], custom: true };
    const updated = { ...customExercises, [group]: [...(customExercises[group]||[]).filter(e=>e.name!==name), entry] };
    setCustomExercises(updated);
    try { await window.storage.set("gym_custom_ex_v4", JSON.stringify(updated)); } catch(e) {}
  }

  // Replace a session exercise with a custom-typed one, or delete it
  function handleEditEx({ action, idx, newName, isCompound }) {
    setEditExIdx(null);
    if (action === "delete") {
      const updated = session.exercises.filter((_,i)=>i!==idx);
      const totalSets = updated.reduce((a,e)=>a+e.sets,0);
      const ni = {};
      // Remap inputs: shift all keys above deleted index down by 1
      Object.entries(setInputs).forEach(([k,v])=>{
        const [ei,si,f] = k.split("-");
        const eiN = parseInt(ei);
        if (eiN < idx) ni[k] = v;
        else if (eiN > idx) ni[`${eiN-1}-${si}-${f}`] = v;
      });
      setSetInputs(ni);
      // If deleting active or earlier, clamp activeExIdx
      if (idx <= activeExIdx && activeExIdx > 0) setActiveExIdx(i=>i-1);
      setSession({ ...session, exercises: updated, totalSets, estMinutes: Math.round(totalSets*3.5) });
      return;
    }
    if (action === "replace" && newName.trim()) {
      const old = session.exercises[idx];
      const group = old.group;
      // Save to bank
      saveCustomExercise(group, newName.trim(), old.compound);
      const updated = [...session.exercises];
      updated[idx] = {
        ...old,
        name: newName.trim(),
        suggestion: getSuggestion({name:newName.trim()}, allLogs, old.compound),
      };
      // Clear inputs for this exercise
      const ni = {...setInputs};
      for(let s=0;s<old.sets;s++){delete ni[`${idx}-${s}-reps`];delete ni[`${idx}-${s}-weight`];}
      setSetInputs(ni);
      setSession({...session, exercises: updated});
    }
  }

  function exportData() {
    const data = {
      version: 1,
      exported: new Date().toISOString(),
      logs: allLogs,
      prs,
      programs: customPrograms,
      customExercises,
    };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `iron-log-backup-${new Date().toLocaleDateString("en-GB").replace(/ /g,"-")}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function importData() {
    try {
      const data = JSON.parse(importText);
      if (!data.logs || !data.prs) throw new Error("Invalid file");
      setAllLogs(data.logs);
      setPrs(data.prs);
      if (data.programs)       setCustomPrograms(data.programs);
      if (data.customExercises) setCustomExercises(data.customExercises);
      await window.storage.set("gym_logs_v4",     JSON.stringify(data.logs));
      await window.storage.set("gym_prs_v4",      JSON.stringify(data.prs));
      await window.storage.set("gym_progs_v4",    JSON.stringify(data.programs||{}));
      await window.storage.set("gym_custom_ex_v4",JSON.stringify(data.customExercises||{}));
      setImportStatus("ok");
      setImportText("");
      setTimeout(() => setImportStatus(null), 3000);
    } catch(e) {
      setImportStatus("error");
      setTimeout(() => setImportStatus(null), 3000);
    }
  }

  function toggleGroup(g)    { setSelectedGroups(p=>p.includes(g)?p.filter(x=>x!==g):[...p,g]); }
  function toggleBigThree(k) { setSelectedBigThree(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]); }

  function startSession(){
    const built=buildSession(selectedGroups,selectedBigThree,allLogs,customPrograms,customExercises);
    setSession(built);setActiveExIdx(0);setActiveSetIdx(0);
    setResting(false);setSetInputs({});setSessionComplete(false);setNewPRs([]);
    setScreen("session");
  }

  function getInput(ei,si,f){return setInputs[`${ei}-${si}-${f}`]||"";}
  function putInput(ei,si,f,v){setSetInputs(p=>({...p,[`${ei}-${si}-${f}`]:v}));}

  function handleSwap(newName){
    const idx=swapIdx; setSwapIdx(null);
    const found=findExercise(newName); if(!found) return;
    const old=session.exercises[idx];
    const updated=[...session.exercises];
    updated[idx]={
      ...found,group:found.group,sets:old.sets,repRange:old.repRange,
      customProgram:null,isBigThree:false,
      suggestion:getSuggestion(found,allLogs,found.compound),
    };
    const ni={...setInputs};
    for(let s=0;s<old.sets;s++){delete ni[`${idx}-${s}-reps`];delete ni[`${idx}-${s}-weight`];}
    setSetInputs(ni);
    setSession({...session,exercises:updated});
  }

  async function logSet(){
    const ex=session.exercises[activeExIdx];
    const reps=getInput(activeExIdx,activeSetIdx,"reps");
    const weight=getInput(activeExIdx,activeSetIdx,"weight");
    if(!reps||!weight) return;
    // Mark set as logged
    setSetInputs(p=>({...p,[`${activeExIdx}-${activeSetIdx}-logged`]:true}));
    // If not the last set, advance set index and start rest
    if(activeSetIdx < ex.sets-1){
      setActiveSetIdx(i=>i+1);
      setResting(true);
    }
    // If last set, just show rest but don't advance exercise — user presses Done
    else {
      setResting(true);
    }
  }

  async function doneExercise(){
    const ex=session.exercises[activeExIdx];
    const newLogs={...allLogs},newPrsL={...prs},prList=[...newPRs];
    const allSets=Array.from({length:ex.sets},(_,i)=>({
      reps:getInput(activeExIdx,i,"reps"),
      weight:getInput(activeExIdx,i,"weight"),
    })).filter(s=>s.reps&&s.weight);
    if(allSets.length>0){
      newLogs[ex.name]=[...(newLogs[ex.name]||[]),{
        date:new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}),
        sets:allSets, muscleGroup:ex.group,
        program:ex.customProgram?.name||null,
      }];
      const best=Math.max(...allSets.map(s=>parseFloat(s.weight)*(1+parseInt(s.reps)/30)));
      if(best>(newPrsL[ex.name]||0)){newPrsL[ex.name]=best;prList.push(ex.name);}
      setPrs(newPrsL);setNewPRs(prList);
      try{await window.storage.set("gym_prs_v4",JSON.stringify(newPrsL));}catch(e){}
    }
    setAllLogs(newLogs);
    try{await window.storage.set("gym_logs_v4",JSON.stringify(newLogs));}catch(e){}
    const isLastEx=activeExIdx===session.exercises.length-1;
    if(isLastEx) setSessionComplete(true);
    else { setActiveExIdx(i=>i+1); setActiveSetIdx(0); setResting(false); }
  }

    setActiveExIdx(idx);
    setActiveSetIdx(0);

  return (

                      {ex.customProgram.calcWeight && (
                        <div style={{marginTop:5,display:"flex",alignItems:"baseline",gap:6}}>
                          <span style={{fontSize:"0.68rem",color:"#f59e0b66"}}>Working weight ({ex.customProgram.pct}% of {ex.customProgram.oneRM}lbs):</span>
                          <span style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"1.4rem",color:"#f59e0b",lineHeight:1}}>{ex.customProgram.calcWeight}</span>
                          <span style={{fontSize:"0.68rem",color:"#f59e0b66"}}>lbs</span>
                        </div>
                      )}
                    </div>
                  </div>
                )}
                {!ex.customProgram && ex.suggestion && (
                  <div className="overload-pill">
                    <span>⚡</span>
                    <span><strong>Overload target:</strong> {ex.suggestion.weight}lbs × {ex.suggestion.repRange} reps<br/><span style={{fontSize:".7rem",opacity:.7}}>{ex.suggestion.note}</span></span>
                  </div>
                )}

                {/* Set dots + +/- */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div className="set-dots" style={{marginBottom:0,flex:1,flexWrap:"wrap"}}>
                    {Array.from({length:ex.sets}).map((_,i)=>{
                      const logged=!!(getInput(activeExIdx,i,"reps")&&getInput(activeExIdx,i,"weight"));
                      return (
                        <div key={i}
                          className={`set-dot${logged&&i<activeSetIdx?" done":i===activeSetIdx?" active":logged?" done":""}`}
                          style={{cursor:i<=activeSetIdx?"pointer":"default"}}
                          onClick={()=>{ if(i<=activeSetIdx){ setActiveSetIdx(i); setResting(false); } }}>
                          {logged&&i<activeSetIdx?"✓":i+1}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:10,flexShrink:0}}>
                    <button disabled={ex.sets<=1}
                      onClick={()=>{
                        const newSets=Math.max(1,ex.sets-1);
                        const updated=[...session.exercises];
                        updated[activeExIdx]={...ex,sets:newSets};
                        const ni={...setInputs};
                        delete ni[`${activeExIdx}-${newSets}-reps`];
                        delete ni[`${activeExIdx}-${newSets}-weight`];
                        setSetInputs(ni);
                        if(activeSetIdx>=newSets) setActiveSetIdx(newSets-1);
                        setSession({...session,exercises:updated,totalSets:session.totalSets-1,estMinutes:Math.round((session.totalSets-1)*3.5)});
                      }}
                      style={{width:30,height:30,borderRadius:8,border:"1.5px solid #1e1e2e",background:"#0c0c18",color:ex.sets<=1?"#1e1e2e":"#888",fontSize:"1.1rem",cursor:ex.sets<=1?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>−</button>
                    <button onClick={()=>{
                        const updated=[...session.exercises];
                        updated[activeExIdx]={...ex,sets:ex.sets+1};
                        setSession({...session,exercises:updated,totalSets:session.totalSets+1,estMinutes:Math.round((session.totalSets+1)*3.5)});
                      }}
                      style={{width:30,height:30,borderRadius:8,border:"1.5px solid #f59e0b33",background:"#f59e0b0e",color:"#f59e0b",fontSize:"1.1rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>+</button>
                  </div>
                </div>

                {/* Rest timer inline */}
                {resting && (
                  <div style={{background:"#0c0c18",borderRadius:12,padding:"12px",marginBottom:12,textAlign:"center"}}>
                    <div style={{fontSize:"0.78rem",color:"#22c55e",fontWeight:700,marginBottom:6}}>
                      ✓ Set {activeSetIdx} logged — {getInput(activeExIdx,activeSetIdx-1,"reps")} reps @ {getInput(activeExIdx,activeSetIdx-1,"weight")}lbs
                    </div>
                    <RestTimer isCompound={ex.compound} onDone={afterRest}/>
                  </div>
                )}

                {/* Current set inputs */}
                {!resting && (
                  <>
                    <div className="active-set-title">Set {activeSetIdx+1} of {ex.sets}</div>
                    <div className="inputs-row">
                      <div className="input-wrap">
                        <div className="input-label">Reps</div>
                        <input className="set-input" type="number" inputMode="decimal"
                          placeholder={ex.customProgram?.repRange||ex.suggestion?.repRange?.split("–")[0]||"reps"}
                          value={getInput(activeExIdx,activeSetIdx,"reps")}
                          onChange={e=>putInput(activeExIdx,activeSetIdx,"reps",e.target.value)}/>
                      </div>
                      <div className="input-wrap">
                        <div className="input-label">Weight (lbs)</div>
                        <input className="set-input" type="number" inputMode="decimal"
                          placeholder={ex.suggestion?`${ex.suggestion.weight}`:"lbs"}
                          value={getInput(activeExIdx,activeSetIdx,"weight")}
                          onChange={e=>putInput(activeExIdx,activeSetIdx,"weight",e.target.value)}/>
                      </div>
                    </div>
                    <div className="btn-row">
                      <button className="log-btn" disabled={!canLogSet} onClick={logSet}>
                        {onLastSet?"Log Final Set ✓":`Log Set ${activeSetIdx+1} →`}
                      </button>
                      <button className="swap-btn" onClick={()=>setEditExIdx(activeExIdx)}>
                        <span style={{fontSize:"1.1rem"}}>✏️</span><span>Edit</span>
                      </button>
                    </div>
                  </>
                )}

                {/* Done with Exercise button — always visible once at least 1 set logged */}
                {setsLoggedThisEx > 0 && (
                  <button onClick={doneExercise}
                    style={{width:"100%",marginTop:10,padding:"13px",border:"1.5px solid #22c55e44",borderRadius:12,background:"#0d1a10",color:"#22c55e",fontFamily:"Bebas Neue,sans-serif",fontSize:"1.1rem",letterSpacing:"0.08em",cursor:"pointer"}}>
                    ✓ Done with {ex.name.split(" ").slice(-1)[0]} — Next Exercise →
                  </button>
                )}
              </div>

              {/* Upcoming — tappable to jump */}
              {session.exercises.slice(activeExIdx+1).length>0 && (
                <div className="upcoming-section">
                  <div className="label" style={{marginBottom:6}}>Up Next — tap to jump</div>
                  {session.exercises.slice(activeExIdx+1).map((e,i)=>{
                    const realIdx=activeExIdx+1+i;
                    return (
                      <div key={i} className="upcoming-item" style={{cursor:"pointer"}}
                        onClick={()=>jumpToExercise(realIdx)}>
                        <div className="upcoming-num">{activeExIdx+2+i}</div>
                        <div className="upcoming-info" style={{flex:1}}>
                          <div className="upcoming-name">
                            {e.name}
                            {e.customProgram&&<span style={{fontSize:".62rem",color:"#f59e0b88",marginLeft:6}}>📋 {e.customProgram.name}</span>}
                          </div>
                          <div className="upcoming-type">{e.isBigThree?"Big Three":e.compound?"Compound":"Isolation"} · {MUSCLE_GROUPS[e.group]?.icon} {e.group}</div>
                        </div>
                        <div className="upcoming-right">
                          <div className="upcoming-sets">{e.sets}×{e.repRange}</div>
                          <button className="upcoming-swap" onClick={ev=>{ev.stopPropagation();setEditExIdx(realIdx);}}>✏️</button>
                          <button className="upcoming-swap" style={{color:"#ef444455",borderColor:"#ef444422"}}
                            onClick={ev=>{ev.stopPropagation();handleEditEx({action:"delete",idx:realIdx});}}>✕</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          );
        })()}

        {/* ── SESSION COMPLETE ── */}
        {screen==="session" && sessionComplete && (
          <div className="complete-wrap">
            <div className="complete-icon">🔥</div>
            <div className="complete-title">Session Complete!</div>
            <div className="complete-sub">All sets logged. PRs and overload targets updated for next time.</div>
            <div className="complete-stats">
              <div><div className="c-stat-val">{session.exercises.length}</div><div className="c-stat-label">Exercises</div></div>
              <div><div className="c-stat-val">{session.totalSets}</div><div className="c-stat-label">Total Sets</div></div>
              <div><div className="c-stat-val">~{session.estMinutes}</div><div className="c-stat-label">Minutes</div></div>
            </div>
            {newPRs.length>0&&(
              <div className="pr-earned">
                <div className="pr-earned-title">🔥 New PRs This Session</div>
                {newPRs.map(n=><div key={n} className="pr-earned-item">· {n}</div>)}
              </div>
            )}
            <button className="done-btn" onClick={()=>{setScreen("home");setSelectedGroups([]);setSelectedBigThree([]);}}>Back to Home</button>
          </div>
        )}

        {/* ── HISTORY ── */}
        {screen==="history" && (
          <div className="section">
            <div className="filter-scroll">
              {["All",...ALL_GROUPS].map(g=>(
                <button key={g} className={`filter-chip${historyFilter===g?" active":""}`} onClick={()=>setHistoryFilter(g)}>
                  {g==="All"?"All":`${MUSCLE_GROUPS[g].icon} ${g}`}
                </button>
              ))}
            </div>
            {filteredHistory.length===0?<div className="empty">No sessions yet.<br/>Build your first session! 💪</div>
              :filteredHistory.map((entry,i)=>{
                const vs=(entry.sets||[]).filter(s=>s.weight&&s.reps);
                const best=vs.length>0?Math.max(...vs.map(s=>parseFloat(s.weight)*(1+parseInt(s.reps)/30))):0;
                const isPR=best>0&&prs[entry.exercise]&&Math.abs(best-prs[entry.exercise])<.01;
                return (
                  <div className="h-card" key={i}>
                    <div className="h-name">{entry.exercise}{isPR&&<span className="pr-badge">PR 🔥</span>}</div>
                    <div className="h-meta">
                      <span>{entry.date}</span>
                      <span>{MUSCLE_GROUPS[entry.muscleGroup]?.icon} {entry.muscleGroup}</span>
                      {entry.program&&<span className="h-prog-tag">📋 {entry.program}</span>}
                      <span>{entry.sets?.length} sets</span>
                    </div>
                    <div className="h-sets">{(entry.sets||[]).map((s,j)=><div className="h-chip" key={j}><strong>{s.reps}</strong> × <strong>{s.weight}</strong>lbs</div>)}</div>
                  </div>
                );
              })}
          </div>
        )}

        {/* ── PRs ── */}
        {screen==="prs" && (
          <div className="section">
            {prEntries.length===0?<div className="empty">No PRs yet.<br/>Complete a session to start tracking! 🏋️</div>
              :ALL_GROUPS.map(group=>{
                const gPRs=prEntries.filter(([ex])=>getMG(ex)===group);
                if(!gPRs.length) return null;
                return (
                  <div key={group}>
                    <div className="pr-sec-label">{MUSCLE_GROUPS[group].icon} {group}</div>
                    {gPRs.map(([ex,val])=>(
                      <div className="pr-card" key={ex}>
                        <div><div className="pr-name">{ex}</div><div className="pr-sub">Est. 1-Rep Max</div></div>
                        <div style={{textAlign:"right"}}><div className="pr-val">{val.toFixed(1)}</div><div className="pr-sub">lbs</div></div>
                      </div>
                    ))}
                  </div>
                );
              })}
          </div>
        )}

        {/* ── DATA ── */}
        {screen==="data" && (
          <div className="section" style={{paddingTop:8}}>
            <div style={{background:"#0e0e1c",borderRadius:16,padding:"18px 16px",marginBottom:12,border:"1px solid #18182c"}}>
              <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"#3a3a58",marginBottom:6}}>Backup Your Data</div>
              <div style={{fontSize:"0.82rem",color:"#44445a",lineHeight:1.6,marginBottom:14}}>
                Downloads a JSON file with all your workout logs, PRs, programs, and custom exercises. Keep this somewhere safe — iCloud, email, Notes, anywhere.
              </div>
              <div style={{display:"flex",gap:10,marginBottom:10,fontSize:"0.72rem",color:"#3a3a58",flexWrap:"wrap"}}>
                <span>📋 {Object.keys(allLogs).length} exercises logged</span>
                <span>🏆 {Object.keys(prs).length} PRs tracked</span>
                <span>📅 {Object.values(allLogs).reduce((a,v)=>a+v.length,0)} total sessions</span>
              </div>
              <button onClick={exportData}
                style={{width:"100%",padding:"14px",border:"none",borderRadius:12,background:"linear-gradient(135deg,#f59e0b,#ef4444)",color:"#fff",fontFamily:"Bebas Neue,sans-serif",fontSize:"1.15rem",letterSpacing:"0.1em",cursor:"pointer"}}>
                ⬇ Export Backup
              </button>
            </div>

            <div style={{background:"#0e0e1c",borderRadius:16,padding:"18px 16px",border:"1px solid #18182c"}}>
              <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"#3a3a58",marginBottom:6}}>Restore From Backup</div>
              <div style={{fontSize:"0.82rem",color:"#44445a",lineHeight:1.6,marginBottom:14}}>
                Open your backup JSON file, select all the text, and paste it below. This will overwrite your current data.
              </div>

              {!showImport ? (
                <button onClick={()=>setShowImport(true)}
                  style={{width:"100%",padding:"13px",border:"1.5px solid #1e1e2e",borderRadius:12,background:"#14141f",color:"#44445a",fontFamily:"Bebas Neue,sans-serif",fontSize:"1rem",letterSpacing:"0.1em",cursor:"pointer"}}>
                  ⬆ Import Backup
                </button>
              ) : (
                <>
                  <textarea
                    value={importText}
                    onChange={e=>setImportText(e.target.value)}
                    placeholder='Paste your backup JSON here...'
                    style={{width:"100%",minHeight:120,background:"#0c0c18",border:"1.5px solid #18182c",borderRadius:11,color:"#eeeef5",fontFamily:"DM Sans,sans-serif",fontSize:"0.82rem",padding:"12px",resize:"vertical",marginBottom:10}}
                  />
                  {importStatus==="ok" && (
                    <div style={{background:"#0d1a10",border:"1px solid #22c55e33",borderRadius:10,padding:"10px 14px",marginBottom:10,fontSize:"0.82rem",color:"#22c55e",fontWeight:700}}>
                      ✓ Data restored successfully!
                    </div>
                  )}
                  {importStatus==="error" && (
                    <div style={{background:"#1a0a0a",border:"1px solid #ef444433",borderRadius:10,padding:"10px 14px",marginBottom:10,fontSize:"0.82rem",color:"#ef4444",fontWeight:700}}>
                      ✕ Invalid backup file — check the JSON and try again.
                    </div>
                  )}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                    <button onClick={()=>{setShowImport(false);setImportText("");setImportStatus(null);}}
                      style={{padding:"12px",border:"1px solid #1e1e2e",borderRadius:11,background:"#14141f",color:"#44445a",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.82rem",cursor:"pointer"}}>
                      Cancel
                    </button>
                    <button disabled={!importText.trim()} onClick={importData}
                      style={{padding:"12px",border:"none",borderRadius:11,background:importText.trim()?"linear-gradient(135deg,#f59e0b,#ef4444)":"#14141f",color:importText.trim()?"#fff":"#2a2a40",fontFamily:"Bebas Neue,sans-serif",fontSize:"1rem",letterSpacing:"0.08em",cursor:importText.trim()?"pointer":"default"}}>
                      Restore →
                    </button>
                  </div>
                </>
              )}
            </div>

            <div style={{marginTop:16,padding:"14px 16px",background:"#0a0a14",borderRadius:12,border:"1px dashed #1a1a2e"}}>
              <div style={{fontSize:"0.65rem",color:"#28284a",lineHeight:1.7}}>
                💡 <strong style={{color:"#3a3a58"}}>Tip:</strong> Export a backup before reinstalling the app or switching phones. Your data lives on this device only — it's not synced to the cloud.
              </div>
            </div>
          </div>
        )}

        {/* ── EDIT EXERCISE SHEET ── */}
        {editExIdx!==null&&session&&(
          <EditExSheet
            exercise={session.exercises[editExIdx]}
            idx={editExIdx}
            onAction={handleEditEx}
            onClose={()=>setEditExIdx(null)}
          />
        )}

        {/* ── PROGRAM SHEET ── */}
        {programKey!==null&&(
          <ProgramSheet
            b3key={programKey}
            existing={customPrograms[programKey]||null}
            onSave={prog=>saveProgram(programKey,prog)}
            onDelete={()=>deleteProgram(programKey)}
            onClose={()=>setProgramKey(null)}
          />
        )}

      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GymTracker />);
  </script>

  <!-- Service Worker registration for offline support -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Inline service worker as blob
        const swCode = `
          const CACHE = 'ironlog-v1';
          const ASSETS = ['/'];
          self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
          });
          self.addEventListener('fetch', e => {
            e.respondWith(
              caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('/')))
            );
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl);
      });
    }
  </script>
