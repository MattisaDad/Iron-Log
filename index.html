  <!-- Storage shim using localStorage so data persists on device -->
  <script>
    window.storage = {
      get: async (key) => {
        try {
          const val = localStorage.getItem('ironlog_' + key);
          if (val === null) throw new Error('not found');
          return { key, value: val };
        } catch(e) { throw e; }
      },
      set: async (key, value) => {
        localStorage.setItem('ironlog_' + key, value);
        return { key, value };
      },
      delete: async (key) => {
        localStorage.removeItem('ironlog_' + key);
        return { key, deleted: true };
      },
      list: async (prefix) => {
        const keys = Object.keys(localStorage)
          .filter(k => k.startsWith('ironlog_' + (prefix||'')))
          .map(k => k.replace('ironlog_',''));
        return { keys };
      }
    };
  </script>

const ALL_GROUPS = Object.keys(MUSCLE_GROUPS);
const COMPOUND_SETS = 4; const ISOLATION_SETS = 3;
const COMPOUND_REPS = "6–10"; const ISOLATION_REPS = "10–15";
const DEFAULT_BIG3  = { sets: 4, repRange: "6–10" };

// ─── Session Builder ───────────────────────────────────────────────────────────
function buildSession(selectedGroups, selectedBigThree, allLogs, customPrograms, customExercises={}) {
  let exercises = [];

  // Big Three go FIRST, always
  selectedBigThree.forEach(key => {
    const cfg  = BIG_THREE[key];
    const prog = customPrograms[key] || null;
    const history = allLogs[cfg.lift] || [];
    let suggestion = null;
    if (!prog && history.length > 0) {
      const last = history[history.length - 1];
      const ls = last.sets || [];
      if (ls.length > 0) {
        const lw = parseFloat(ls[0]?.weight)||0, lr = parseInt(ls[0]?.reps)||0;
        const topped = ls.every(s => parseInt(s.reps) >= 10);
        if (topped && lw > 0) suggestion = { weight: lw+5, repRange: COMPOUND_REPS, note: `↑ 5lbs — hit top of range at ${lw}lbs` };
        else if (lw > 0)      suggestion = { weight: lw, repRange: `${lr+1}–10`, note: `Push for more reps at ${lw}lbs` };
      }
    }
    exercises.push({
      name:    cfg.lift,
      compound: true,
      group:   cfg.group,
      alts:    cfg.alts,
      sets:    prog ? prog.sets    : DEFAULT_BIG3.sets,
      repRange:prog ? prog.repRange: DEFAULT_BIG3.repRange,
      customProgram: prog,
      suggestion,
      isBigThree: true,
    });
  });

  // Then muscle group exercises
  const TARGET_REMAINING_MIN = Math.max(0, 14 - exercises.reduce((a,e)=>a+e.sets,0));
  const TARGET_REMAINING_MAX = Math.max(0, 17 - exercises.reduce((a,e)=>a+e.sets,0));

  selectedGroups.forEach(group => {
    const baseEx = MUSCLE_GROUPS[group].exercises;
    const userEx = (customExercises[group]||[]).filter(c=>!baseEx.find(b=>b.name===c.name));
    const ex = [...baseEx, ...userEx];
    const compounds  = [...ex.filter(e=>e.compound)].sort((a,b)=>a.priority-b.priority);
    const isolations = [...ex.filter(e=>!e.compound)].sort((a,b)=>a.priority-b.priority);
    const isFocused  = (selectedGroups.length + selectedBigThree.length) <= 2;
    const nC = isFocused ? Math.min(2,compounds.length)  : Math.min(1,compounds.length);
    const nI = isFocused ? Math.min(2,isolations.length) : Math.min(1,isolations.length);
    const score = e => (allLogs[e.name]?.length||0)*10 - e.priority;
    compounds.sort((a,b)=>score(b)-score(a)).slice(0,nC).forEach(e=>
      exercises.push({...e,group,sets:COMPOUND_SETS,repRange:COMPOUND_REPS,customProgram:null,isBigThree:false,suggestion:getSuggestion(e,allLogs,true)})
    );
    isolations.sort((a,b)=>score(b)-score(a)).slice(0,nI).forEach(e=>
      exercises.push({...e,group,sets:ISOLATION_SETS,repRange:ISOLATION_REPS,customProgram:null,isBigThree:false,suggestion:getSuggestion(e,allLogs,false)})
    );
  });

  // Trim to max
  let totalSets = exercises.reduce((a,e)=>a+e.sets,0);
  const bigThreeSets = exercises.filter(e=>e.isBigThree).reduce((a,e)=>a+e.sets,0);
  while (totalSets > 17 && exercises.length > selectedBigThree.length + selectedGroups.length) {
    const last = exercises[exercises.length-1];
    if (last.isBigThree) break;
    exercises.pop(); totalSets -= last.sets;
  }

  return { exercises, totalSets, estMinutes: Math.round(totalSets * 3.5) };
}

function getSuggestion(ex, allLogs, isCompound) {
  const history = allLogs[ex.name]||[];
  if (!history.length) return null;
  const last = history[history.length-1]; const ls = last.sets||[];
  if (!ls.length) return null;
  const lw=parseFloat(ls[0]?.weight)||0, lr=parseInt(ls[0]?.reps)||0;
  const topped=ls.every(s=>parseInt(s.reps)>=(isCompound?10:15));
  if (topped&&lw>0) { const inc=isCompound?5:2.5; return {weight:lw+inc,repRange:isCompound?COMPOUND_REPS:ISOLATION_REPS,note:`↑ ${inc}lbs — hit top of range at ${lw}lbs`}; }
  if (lw>0) return {weight:lw,repRange:isCompound?`${lr+1}–10`:`${lr+1}–15`,note:`Push for more reps at ${lw}lbs`};
  return null;
}

function findExercise(name) {
  for (const [group,data] of Object.entries(MUSCLE_GROUPS)) {
    const f=data.exercises.find(e=>e.name===name);
    if(f) return {...f,group};
  }
  // check big three
  for (const [key,cfg] of Object.entries(BIG_THREE)) {
    if (cfg.lift===name) return {name:cfg.lift,compound:true,group:cfg.group,alts:cfg.alts};
  }
  return null;
}

// ─── Rest Timer ───────────────────────────────────────────────────────────────
function RestTimer({ isCompound, onDone }) {
  const REST = isCompound ? 120 : 75;
  const [seconds, setSeconds] = useState(REST);
  const ref = useRef(null);
  useEffect(()=>{
    ref.current=setInterval(()=>{
      setSeconds(s=>{if(s<=1){clearInterval(ref.current);onDone();return 0;}return s-1;});
    },1000);
    return()=>clearInterval(ref.current);
  },[]);
  const pct=(seconds/REST)*100;
  const color=seconds>REST*.5?"#22c55e":seconds>REST*.25?"#f59e0b":"#ef4444";
  const display=seconds>=60?`${Math.floor(seconds/60)}:${(seconds%60).toString().padStart(2,"0")}`:`${seconds}s`;
  return (
    <div style={{textAlign:"center",padding:"16px 0"}}>
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="48" fill="none" stroke="#1a1a2a" strokeWidth="8"/>
        <circle cx="55" cy="55" r="48" fill="none" stroke={color} strokeWidth="8"
          strokeDasharray={`${2*Math.PI*48}`} strokeDashoffset={`${2*Math.PI*48*(1-pct/100)}`}
          strokeLinecap="round" style={{transform:"rotate(-90deg)",transformOrigin:"50% 50%",transition:"stroke-dashoffset 1s linear,stroke 0.4s"}}/>
        <text x="55" y="62" textAnchor="middle" fill={color} fontSize="24" fontFamily="Bebas Neue,sans-serif" letterSpacing="1">{display}</text>
      </svg>
      <div style={{color:"#44445a",fontSize:"0.72rem",marginTop:4}}>{isCompound?"2 min rest":"75s rest"}</div>
      <button onClick={onDone} style={{marginTop:12,padding:"7px 20px",background:"#1a1a2a",border:"1px solid #2a2a40",borderRadius:8,color:"#666",fontSize:"0.76rem",cursor:"pointer",fontFamily:"DM Sans,sans-serif",fontWeight:700}}>Skip Rest</button>
    </div>
  );
}

                  {MUSCLE_GROUPS[ae?.group]?.icon||"🔄"}

// Round to nearest 2.5lbs (standard plate math)
function roundToPlate(lbs) { return Math.round(lbs / 2.5) * 2.5; }

function ProgramSheet({ b3key, existing, onSave, onDelete, onClose }) {
  const cfg = BIG_THREE[b3key];
  const [useCustom,  setUseCustom]  = useState(!!existing);
  const [name,       setName]       = useState(existing?.name||"");
  const [sets,       setSets]       = useState(existing?.sets?.toString()||"5");
  const [repRange,   setRepRange]   = useState(existing?.repRange||"5");
  const [note,       setNote]       = useState(existing?.note||"");
  // 1RM + percentage
  const [oneRM,      setOneRM]      = useState(existing?.oneRM?.toString()||"");
  const [pct,        setPct]        = useState(existing?.pct?.toString()||"");
  const [confirmDel, setConfirmDel] = useState(false);

  const oneRMval  = parseFloat(oneRM);
  const pctVal    = parseFloat(pct);
  const calcWeight = (oneRMval > 0 && pctVal > 0)
    ? roundToPlate(oneRMval * (pctVal / 100))
    : null;

  const canSave = !useCustom || (name.trim() && parseInt(sets) > 0 && repRange.trim());

  function handleSave() {
    if (!useCustom) { onDelete(); return; }
    onSave({
      name:     name.trim(),
      sets:     parseInt(sets),
      repRange: repRange.trim(),
      note:     note.trim(),
      oneRM:    oneRMval > 0 ? oneRMval : null,
      pct:      pctVal  > 0 ? pctVal   : null,
      calcWeight,
    });
  }

  return (
    <div style={{position:"fixed",inset:0,zIndex:100,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>

          {/* Default vs Custom toggle */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:18}}>
            {[
              [false,"⚡","Default","4 × 6–10"],
              [true, "📋","Custom Program","your scheme"],
            ].map(([val,icon,label,sub])=>(
              <button key={label} onClick={()=>setUseCustom(val)}
                style={{padding:"11px",borderRadius:11,border:`1.5px solid ${useCustom===val?"#f59e0b":"#1e1e2e"}`,background:useCustom===val?"#f59e0b0e":"#14141f",color:useCustom===val?"#f59e0b":"#44445a",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.82rem",cursor:"pointer",transition:"all .15s"}}>
                <div style={{fontSize:"1rem",marginBottom:3}}>{icon}</div>
                {label}
                <div style={{fontSize:"0.65rem",opacity:.7,marginTop:2}}>{sub}</div>
              </button>
            ))}
          </div>

          {useCustom && !confirmDel && (
            <>
              {/* Program name */}
              <div style={{marginBottom:12}}>
                <div style={labelStyle}>Program Name</div>
                <input value={name} onChange={e=>setName(e.target.value)}
                  placeholder="e.g. 5/3/1, GZCLP, Starting Strength..."
                  style={{...inputStyle, fontSize:"0.95rem", textAlign:"left", padding:"11px 13px", fontWeight:400}}/>
              </div>

              {/* Sets + Reps */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div>
                  <div style={labelStyle}>Sets</div>
                  <input type="number" inputMode="decimal" value={sets} onChange={e=>setSets(e.target.value)} placeholder="5" style={inputStyle}/>

                <div>
                  <div style={labelStyle}>Reps / Scheme</div>

              {/* Divider */}

                Cancel
              </button>

          )}
        </div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function GymTracker() {
  const [screen, setScreen]                     = useState("home");
  const [selectedGroups, setSelectedGroups]     = useState([]);
  const [selectedBigThree, setSelectedBigThree] = useState([]); // keys e.g. ["Bench Press"]
  const [session, setSession]                   = useState(null);
  const [activeExIdx, setActiveExIdx]           = useState(0);
  const [activeSetIdx, setActiveSetIdx]         = useState(0);
  const [resting, setResting]                   = useState(false);
  const [setInputs, setSetInputs]               = useState({});
  const [allLogs, setAllLogs]                   = useState({});
  const [prs, setPrs]                           = useState({});
  const [customPrograms, setCustomPrograms]     = useState({}); // keyed by b3key e.g. "Bench Press"
  const [historyFilter, setHistoryFilter]       = useState("All");
  const [sessionComplete, setSessionComplete]   = useState(false);
  const [newPRs, setNewPRs]                     = useState([]);
  const [swapIdx, setSwapIdx]                   = useState(null);
  const [programKey, setProgramKey]             = useState(null);
  const [customExercises, setCustomExercises]   = useState({});
  const [editExIdx, setEditExIdx]               = useState(null);
  const [importText, setImportText]             = useState("");
  const [importStatus, setImportStatus]         = useState(null);
  const [showImport, setShowImport]             = useState(false);
  const [addingExercise, setAddingExercise]     = useState(false);
  const [addExName, setAddExName]               = useState("");
  const [addExCompound, setAddExCompound]       = useState(true);
  const [savedSession, setSavedSession]         = useState(null); // paused session state
  const [historyView, setHistoryView]           = useState("sessions"); // "sessions" | "exercises"
  const [expandedSession, setExpandedSession]   = useState(null);
  const [confirmDeleteSession, setConfirmDeleteSession] = useState(null);
  const [failureAnswer, setFailureAnswer]               = useState(null); // null | "yes" | "no"
  const [showFailureQ, setShowFailureQ]                 = useState(false);
  const [prHistory, setPrHistory]                       = useState({}); // { exName: [{date, oneRM}] }
  const [prGraphEx, setPrGraphEx]                       = useState(null); // exercise name to show graph for

  useEffect(()=>{
    async function load(){
      try{
        const l=await window.storage.get("gym_logs_v4");
        const p=await window.storage.get("gym_prs_v4");
        const c=await window.storage.get("gym_progs_v4");
        const x=await window.storage.get("gym_custom_ex_v4");
        const h=await window.storage.get("gym_pr_history_v4");
        if(l) setAllLogs(JSON.parse(l.value));
        if(p) setPrs(JSON.parse(p.value));
        if(c) setCustomPrograms(JSON.parse(c.value));
        if(x) setCustomExercises(JSON.parse(x.value));
        if(h) setPrHistory(JSON.parse(h.value));
      }catch(e){}
    }
    load();
  },[]);

  async function saveProgram(key, prog) {
    const updated={...customPrograms,[key]:prog};
    setCustomPrograms(updated); setProgramKey(null);
    try{await window.storage.set("gym_progs_v4",JSON.stringify(updated));}catch(e){}
  }
  async function deleteProgram(key) {
    const updated={...customPrograms}; delete updated[key];
    setCustomPrograms(updated); setProgramKey(null);
    try{await window.storage.set("gym_progs_v4",JSON.stringify(updated));}catch(e){}
  }

  // Save a user-typed exercise into the permanent bank for a group
  async function saveCustomExercise(group, name, isCompound) {
    const entry = { name, compound: isCompound, priority: 999, alts: [], custom: true };
    const updated = { ...customExercises, [group]: [...(customExercises[group]||[]).filter(e=>e.name!==name), entry] };
    setCustomExercises(updated);
    try { await window.storage.set("gym_custom_ex_v4", JSON.stringify(updated)); } catch(e) {}
  }

  // Replace a session exercise with a custom-typed one, or delete it
  function handleEditEx({ action, idx, newName, isCompound, saveAsNew }) {
    setEditExIdx(null);
    if (action === "delete") {
      const updated = session.exercises.filter((_,i)=>i!==idx);
      const totalSets = updated.reduce((a,e)=>a+e.sets,0);
      const ni = {};
      Object.entries(setInputs).forEach(([k,v])=>{
        const [ei,si,f] = k.split("-");
        const eiN = parseInt(ei);
        if (eiN < idx) ni[k] = v;
        else if (eiN > idx) ni[`${eiN-1}-${si}-${f}`] = v;
      });
      setSetInputs(ni);
      if (idx <= activeExIdx && activeExIdx > 0) setActiveExIdx(i=>i-1);
      setSession({ ...session, exercises: updated, totalSets, estMinutes: Math.round(totalSets*3.5) });
      return;
    }
    if (action === "replace" && newName.trim()) {
      const old = session.exercises[idx];
      const group = old.group;
      const compound = isCompound !== undefined ? isCompound : old.compound;
      // Always save to custom bank (built-in picks are fine to re-save, custom ones definitely need saving)
      saveCustomExercise(group, newName.trim(), compound);
      const updated = [...session.exercises];
      updated[idx] = {
        ...old,
        name: newName.trim(),
        compound,
        suggestion: getSuggestion({name:newName.trim()}, allLogs, compound),
      };
      const ni = {...setInputs};
      for(let s=0;s<old.sets;s++){delete ni[`${idx}-${s}-reps`];delete ni[`${idx}-${s}-weight`];}
      setSetInputs(ni);
      setSession({...session, exercises: updated});
    }
  }

  function exportData() {
    const data = {
      version: 1,
      exported: new Date().toISOString(),
      logs: allLogs,
      prs,
      programs: customPrograms,
      customExercises,
      prHistory,
    };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `iron-log-backup-${new Date().toLocaleDateString("en-GB").replace(/ /g,"-")}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function importData() {
    try {
      const data = JSON.parse(importText);
      if (!data.logs || !data.prs) throw new Error("Invalid file");
      setAllLogs(data.logs);
      setPrs(data.prs);
      if (data.programs)        setCustomPrograms(data.programs);
      if (data.customExercises)  setCustomExercises(data.customExercises);
      if (data.prHistory)        setPrHistory(data.prHistory);
      await window.storage.set("gym_logs_v4",      JSON.stringify(data.logs));
      await window.storage.set("gym_prs_v4",       JSON.stringify(data.prs));
      await window.storage.set("gym_progs_v4",     JSON.stringify(data.programs||{}));
      await window.storage.set("gym_custom_ex_v4", JSON.stringify(data.customExercises||{}));
      await window.storage.set("gym_pr_history_v4",JSON.stringify(data.prHistory||{}));
      setImportStatus("ok");
      setImportText("");
      setTimeout(() => setImportStatus(null), 3000);
    } catch(e) {

  async function deleteSessionLog(sessionId) {
    // sessionId is a string: "exerciseName|||dateStr|||index"
    const [exName, dateStr, idxStr] = sessionId.split("|||");
    const idx = parseInt(idxStr);
    const updated = {...allLogs};
    if (updated[exName]) {
      updated[exName] = updated[exName].filter((_,i) => {
        // match by date and index within that exercise's logs
        return !(updated[exName][i].date === dateStr && i === idx);
      });
      if (updated[exName].length === 0) delete updated[exName];
    }
    setAllLogs(updated);
    setConfirmDeleteSession(null);
    try { await window.storage.set("gym_logs_v4", JSON.stringify(updated)); } catch(e) {}
  }

  async function deleteFullSession(sessionKey) {
    // sessionKey: "title|||dateStr" — delete ALL exercise entries from that date+title
    const [title, dateStr] = sessionKey.split("|||");
    const updated = {...allLogs};
    Object.keys(updated).forEach(ex => {
      updated[ex] = updated[ex].filter(l => !(l.date === dateStr && (l.sessionTitle||"") === title));
      if (updated[ex].length === 0) delete updated[ex];
    });
    setAllLogs(updated);
    setConfirmDeleteSession(null);
    setExpandedSession(null);
    try { await window.storage.set("gym_logs_v4", JSON.stringify(updated)); } catch(e) {}
  }

  function putInput(ei,si,f,v){setSetInputs(p=>({...p,[`${ei}-${si}-${f}`]:v}));}

  function handleSwap(newName){
    const idx=swapIdx; setSwapIdx(null);
    const found=findExercise(newName); if(!found) return;
    const old=session.exercises[idx];
    const updated=[...session.exercises];
    updated[idx]={
      ...found,group:found.group,sets:old.sets,repRange:old.repRange,
      customProgram:null,isBigThree:false,
      suggestion:getSuggestion(found,allLogs,found.compound),
    };
    const ni={...setInputs};
    for(let s=0;s<old.sets;s++){delete ni[`${idx}-${s}-reps`];delete ni[`${idx}-${s}-weight`];}
    setSetInputs(ni);
    setSession({...session,exercises:updated});
  }

  async function logSet(){
    const ex=session.exercises[activeExIdx];
    const reps=getInput(activeExIdx,activeSetIdx,"reps");
    const weight=getInput(activeExIdx,activeSetIdx,"weight");
    if(!reps||!weight) return;
    // Mark set as logged
    setSetInputs(p=>({...p,[`${activeExIdx}-${activeSetIdx}-logged`]:true}));
    // If not the last set, advance set index and start rest
    if(activeSetIdx < ex.sets-1){
      setActiveSetIdx(i=>i+1);
      setResting(true);
    }
    // If last set, just show rest but don't advance exercise — user presses Done
    else {
      setResting(true);
    }
  }

  async function confirmDoneExercise(wentToFailure){
    setShowFailureQ(false);
    const ex=session.exercises[activeExIdx];
    const newLogs={...allLogs},newPrsL={...prs},prList=[...newPRs];
    const allSets=Array.from({length:ex.sets},(_,i)=>({
      reps:getInput(activeExIdx,i,"reps"),
      weight:getInput(activeExIdx,i,"weight"),
    })).filter(s=>s.reps&&s.weight);

    // Calculate 1RM using the Epley-variant formula: Weight × (36 / (37 - Reps))
    // Use last set if went to failure, else best estimated set
    let calc1RM = null;
    if (allSets.length > 0) {
      if (wentToFailure) {
        const lastSet = allSets[allSets.length - 1];
        const w = parseFloat(lastSet.weight), r = parseInt(lastSet.reps);
        if (w > 0 && r > 0 && r < 37) calc1RM = w * (36 / (37 - r));
      } else {
        // Estimate from best set using same formula
        const best = allSets.reduce((b,s)=>{
          const w=parseFloat(s.weight),r=parseInt(s.reps);
          if(w>0&&r>0&&r<37){ const est=w*(36/(37-r)); return est>b?est:b; }
          return b;
        }, 0);
        if (best > 0) calc1RM = best;
      }
    }

    if(allSets.length>0){
      const dateStr = new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
      newLogs[ex.name]=[...(newLogs[ex.name]||[]),{
        date: dateStr,
        sets: allSets,
        muscleGroup: ex.group,
        program: ex.customProgram?.name||null,
        sessionTitle: session.title||"Workout",
        wentToFailure,
        calc1RM: calc1RM ? Math.round(calc1RM * 10) / 10 : null,
      }];

      // Update PR (use calc1RM if available, else best estimated)
      const prVal = calc1RM || Math.max(...allSets.map(s=>parseFloat(s.weight)*(36/(37-Math.min(parseInt(s.reps),36)))));
      if(prVal>(newPrsL[ex.name]||0)){newPrsL[ex.name]=prVal;prList.push(ex.name);}
      setPrs(newPrsL);setNewPRs(prList);
      try{await window.storage.set("gym_prs_v4",JSON.stringify(newPrsL));}catch(e){}

      // Save 1RM history point
      if (calc1RM) {
        const dateStr2 = new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
        const newPrHist = {...prHistory, [ex.name]: [...(prHistory[ex.name]||[]), {date: dateStr2, oneRM: Math.round(calc1RM * 10)/10, wentToFailure}]};
        setPrHistory(newPrHist);
        try{await window.storage.set("gym_pr_history_v4",JSON.stringify(newPrHist));}catch(e){}
      }
    }
    setAllLogs(newLogs);
    try{await window.storage.set("gym_logs_v4",JSON.stringify(newLogs));}catch(e){}
    const isLastEx=activeExIdx===session.exercises.length-1;
    if(isLastEx) setSessionComplete(true);
    else { setActiveExIdx(i=>i+1); setActiveSetIdx(0); setResting(false); }
  }

    .pr-badge{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:.55rem;font-weight:800;padding:2px 7px;border-radius:20px;letter-spacing:.08em;text-transform:uppercase;margin-left:8px;vertical-align:middle;}
    .pr-sec-label{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:#6666888;letter-spacing:.08em;margin:16px 0 8px;}
    .pr-card{background:linear-gradient(135deg,#12100a,#100a0a);border:1px solid #f59e0b1c;border-radius:13px;padding:12px 15px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
    .pr-name{font-weight:700;font-size:.88rem;color:#ddddf0;margin-bottom:2px;}
    .pr-sub{font-size:.6rem;color:#8888aa;text-transform:uppercase;letter-spacing:.07em;}
    .pr-val{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:#f59e0b;line-height:1;}
    .empty{text-align:center;color:#44447a;padding:50px 20px;font-size:.86rem;line-height:1.85;}
    .drag-handle{cursor:grab;padding:0 4px;color:#7777aa;font-size:1.1rem;touch-action:none;user-select:none;}
    .drag-handle:active{cursor:grabbing;}
    input,textarea{outline:none;}
  `;

  return (
    <>
      <style>{css}</style>
      <div className="app">

        <div className="header">
          <div className="header-title">Iron Log</div>
          <div className="header-sub">Intermediate · 3–4 Days/Week · Compound-First</div>
        </div>

        {screen!=="session" && (
          <div className="nav">
            {[["home","🏠 Home"],["history","📊 History"],["prs","🏆 PRs"],["data","💾 Data"]].map(([id,label])=>(
              <button key={id} className={`nav-btn${screen===id?" active":""}`} onClick={()=>setScreen(id)}>{label}</button>
            ))}
          </div>
        )}

        {/* ── HOME ── */}
        {screen==="home" && (
          <>
            {/* Resume Session banner */}
            {savedSession && (
              <div style={{margin:"0 18px 14px",background:"linear-gradient(135deg,#f59e0b0e,#ef44440e)",border:"1.5px solid #f59e0b33",borderRadius:14,padding:"13px 15px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                <div>
                  <div style={{fontSize:"0.65rem",fontWeight:700,color:"#f59e0b88",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>Session Paused</div>
                  <div style={{fontWeight:700,fontSize:"0.92rem",color:"#eeeef5"}}>{savedSession.session.title||"Workout"}</div>
                  <div style={{fontSize:"0.72rem",color:"#8888aa",marginTop:1}}>Exercise {savedSession.activeExIdx+1} of {savedSession.session.exercises.length}</div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setSavedSession(null)}
                    style={{padding:"8px 10px",borderRadius:9,border:"1px solid #ef444433",background:"none",color:"#ef444488",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.72rem",cursor:"pointer"}}>
                    Discard
                  </button>
                  <button onClick={resumeSession}
                    style={{padding:"8px 14px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#f59e0b,#ef4444)",color:"#fff",fontFamily:"Bebas Neue,sans-serif",fontSize:"0.95rem",letterSpacing:"0.06em",cursor:"pointer"}}>
                    Resume →
                  </button>
                </div>
              </div>
            )}
            <div className="hero">
              <div className="hero-title">What are we training today?</div>
              <div className="hero-sub">Select the Big Three and / or muscle groups. Big Three always go first in your session.</div>
              <div className="level-badge">⚡ Intermediate · Compound-First · Progressive Overload</div>
            </div>
            <div className="section">

              {/* Big Three */}
              <div className="label">The Big Three</div>
              <div className="b3-grid">
                {BIG_THREE_KEYS.map(key=>{
                  const cfg=BIG_THREE[key];
                  const sel=selectedBigThree.includes(key);
                  const prog=customPrograms[key];
                  return (
                    <div key={key} className={`b3-card${sel?" selected":""}`} style={{"--gc":cfg.color}}
                      onClick={()=>toggleBigThree(key)}>
                      <div className="b3-check">✓</div>
                      <div className="b3-card-icon">{cfg.icon}</div>
                      <div className="b3-card-name">{key}</div>
                      <div className="b3-prog-label">
                        {prog ? `📋 ${prog.name}` : `${DEFAULT_BIG3.sets}×${DEFAULT_BIG3.repRange}`}
                      </div>
                      {sel && (
                        <button className="b3-prog-btn" style={{"--gc":cfg.color}}
                          onClick={e=>{e.stopPropagation();setProgramKey(key);}}>
                          {prog?"edit program":"set program"}
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Muscle Groups */}
              <div className="label">Muscle Groups</div>
              <div className="group-grid">
                {ALL_GROUPS.map(g=>{
                  const d=MUSCLE_GROUPS[g],sel=selectedGroups.includes(g);
                  const nc=d.exercises.filter(e=>e.compound).length;
                  return (
                    <div key={g} className={`group-card${sel?" selected":""}`} style={{"--gc":d.color}} onClick={()=>toggleGroup(g)}>
                      <div className="group-check">✓</div>
                      <div className="group-card-icon">{d.icon}</div>
                      <div className="group-card-name">{g}</div>
                      <div className="group-card-meta">{nc} compound · {d.exercises.length-nc} isolation</div>
                    </div>
                  );
                })}
              </div>

              <button className="build-btn" disabled={!hasSelection} onClick={startSession}>
                {!hasSelection ? "Select Something to Train"
                  : `Build Session${selectedBigThree.length>0?" — "+selectedBigThree.join(", "):""}${selectedGroups.length>0?(selectedBigThree.length>0?" + ":"")+selectedGroups.join(" + "):""} →`}
              </button>
            </div>
          </>
        )}

        {/* ── SESSION ── */}
        {screen==="session" && session && !sessionComplete && (()=>{
          const ex=session.exercises[activeExIdx];
          const gc=MUSCLE_GROUPS[ex.group]?.color||BIG_THREE_KEYS.map(k=>BIG_THREE[k]).find(c=>c.lift===ex.name)?.color||"#f59e0b";
          const completedEx=session.exercises.slice(0,activeExIdx).length;
          const progress=(completedEx/session.exercises.length)*100;
          const setsLoggedThisEx=Array.from({length:ex.sets},(_,i)=>getInput(activeExIdx,i,"reps")&&getInput(activeExIdx,i,"weight")).filter(Boolean).length;
          const canLogSet=!resting&&getInput(activeExIdx,activeSetIdx,"reps")&&getInput(activeExIdx,activeSetIdx,"weight");
          const onLastSet=activeSetIdx===ex.sets-1;

          return (
            <>
              <div className="session-topbar">
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <button onClick={pauseSession}
                    style={{background:"none",border:"none",color:"#7777aa",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.78rem",cursor:"pointer",padding:"2px 0",display:"flex",alignItems:"center",gap:4}}>
                    ← Home
                  </button>
                  <div style={{fontSize:"0.72rem",fontWeight:700,color:"#aaaacc"}}>{session.title||"Workout"}</div>
                  <div style={{width:50}}/>
                </div>
                <div className="progress-wrap"><div className="progress-bar" style={{width:`${progress}%`}}/></div>
                <div className="session-meta">
                  <span>Exercise <b>{activeExIdx+1}/{session.exercises.length}</b></span>
                  <span>Set <b>{activeSetIdx+1}/{ex.sets}</b></span>
                  <span>~<b>{session.estMinutes} min</b></span>
                </div>
              </div>

              {/* Active exercise card */}
              <div className="ex-card" style={{"--gc":gc}}>
                <div className="ex-card-top">
                  <div className="ex-name">{ex.name}</div>
                  {ex.isBigThree
                    ? <div className="b3-badge">Big Three</div>
                    : <div className="ex-badge" style={{"--gc":gc}}>{ex.compound?"Compound":"Isolation"}</div>}
                </div>
                <div className="rep-range-hint">Target: {ex.sets} sets × {ex.repRange} reps &nbsp;·&nbsp; {MUSCLE_GROUPS[ex.group]?.icon} {ex.group}</div>

                {ex.customProgram && (
                  <div className="program-pill">
                    <span>📋</span>
                    <div style={{flex:1}}>
                      <div><strong>{ex.customProgram.name}</strong>{ex.customProgram.note?` · ${ex.customProgram.note}`:""}</div>
                      {ex.customProgram.calcWeight && (
                        <div style={{marginTop:5,display:"flex",alignItems:"baseline",gap:6}}>
                          <span style={{fontSize:"0.68rem",color:"#f59e0b66"}}>Working weight ({ex.customProgram.pct}% of {ex.customProgram.oneRM}lbs):</span>
                          <span style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"1.4rem",color:"#f59e0b",lineHeight:1}}>{ex.customProgram.calcWeight}</span>
                          <span style={{fontSize:"0.68rem",color:"#f59e0b66"}}>lbs</span>
                        </div>
                      )}
                    </div>
                  </div>
                )}
                {!ex.customProgram && ex.suggestion && (
                  <div className="overload-pill">
                    <span>⚡</span>
                    <span><strong>Overload target:</strong> {ex.suggestion.weight}lbs × {ex.suggestion.repRange} reps<br/><span style={{fontSize:".7rem",opacity:.7}}>{ex.suggestion.note}</span></span>
                  </div>
                )}

                {/* #6 — Last session data */}
                {(()=>{
                  const hist = allLogs[ex.name];
                  const last = hist?.[hist.length-1];
                  if (!last?.sets?.length) return null;
                  return (
                    <div className="last-session-pill">
                      <span>📅</span>
                      <div>
                        <div style={{fontWeight:700,fontSize:"0.72rem",marginBottom:3}}>Last session · {last.date}</div>
                        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                          {last.sets.map((s,i)=>(
                            <span key={i} style={{background:"#3b82f614",borderRadius:6,padding:"2px 7px",fontSize:"0.7rem"}}>
                              {s.reps} × {s.weight}lbs
                            </span>
                          ))}
                        </div>
                      </div>
                    </div>
                  );
                })()}

                {/* Set dots + +/- */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div className="set-dots" style={{marginBottom:0,flex:1,flexWrap:"wrap"}}>
                    {Array.from({length:ex.sets}).map((_,i)=>{
                      const logged=!!(getInput(activeExIdx,i,"reps")&&getInput(activeExIdx,i,"weight"));
                      return (
                        <div key={i}
                          className={`set-dot${logged&&i<activeSetIdx?" done":i===activeSetIdx?" active":logged?" done":""}`}
                          style={{cursor:i<=activeSetIdx?"pointer":"default"}}
                          onClick={()=>{ if(i<=activeSetIdx){ setActiveSetIdx(i); setResting(false); } }}>
                          {logged&&i<activeSetIdx?"✓":i+1}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:10,flexShrink:0}}>
                    <button disabled={ex.sets<=1}
                      onClick={()=>{
                        const newSets=Math.max(1,ex.sets-1);
                        const updated=[...session.exercises];
                        updated[activeExIdx]={...ex,sets:newSets};
                        const ni={...setInputs};
                        delete ni[`${activeExIdx}-${newSets}-reps`];
                        delete ni[`${activeExIdx}-${newSets}-weight`];
                        setSetInputs(ni);
                        if(activeSetIdx>=newSets) setActiveSetIdx(newSets-1);
                        setSession({...session,exercises:updated,totalSets:session.totalSets-1,estMinutes:Math.round((session.totalSets-1)*3.5)});
                      }}
                      style={{width:30,height:30,borderRadius:8,border:"1.5px solid #252538",background:"#12121e",color:ex.sets<=1?"#252538":"#8888aa",fontSize:"1.1rem",cursor:ex.sets<=1?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>−</button>
                    <button onClick={()=>{
                        const updated=[...session.exercises];
                        updated[activeExIdx]={...ex,sets:ex.sets+1};
                        setSession({...session,exercises:updated,totalSets:session.totalSets+1,estMinutes:Math.round((session.totalSets+1)*3.5)});
                      }}
                      style={{width:30,height:30,borderRadius:8,border:"1.5px solid #f59e0b33",background:"#f59e0b0e",color:"#f59e0b",fontSize:"1.1rem",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>+</button>
                  </div>
                </div>

                {/* Rest timer inline */}
                {resting && (
                  <div style={{background:"#0c0c18",borderRadius:12,padding:"12px",marginBottom:12,textAlign:"center"}}>
                    <div style={{fontSize:"0.78rem",color:"#22c55e",fontWeight:700,marginBottom:6}}>
                      ✓ Set {activeSetIdx} logged — {getInput(activeExIdx,activeSetIdx-1,"reps")} reps @ {getInput(activeExIdx,activeSetIdx-1,"weight")}lbs
                    </div>
                    <RestTimer isCompound={ex.compound} onDone={afterRest}/>
                  </div>
                )}

                {/* Current set inputs */}
                {!resting && (
                  <>
                    <div className="active-set-title">Set {activeSetIdx+1} of {ex.sets}</div>
                    <div className="inputs-row">
                      <div className="input-wrap">
                        <div className="input-label">Reps</div>
                        <input className="set-input" type="number" inputMode="decimal"
                          placeholder={ex.customProgram?.repRange||ex.suggestion?.repRange?.split("–")[0]||"reps"}
                          value={getInput(activeExIdx,activeSetIdx,"reps")}
                          onChange={e=>putInput(activeExIdx,activeSetIdx,"reps",e.target.value)}/>
                      </div>
                      <div className="input-wrap">
                        <div className="input-label">Weight (lbs)</div>
                        <input className="set-input" type="number" inputMode="decimal"
                          placeholder={ex.suggestion?`${ex.suggestion.weight}`:"lbs"}
                          value={getInput(activeExIdx,activeSetIdx,"weight")}
                          onChange={e=>putInput(activeExIdx,activeSetIdx,"weight",e.target.value)}/>
                      </div>
                    </div>
                    <div className="btn-row">
                      <button className="log-btn" disabled={!canLogSet} onClick={logSet}>
                        {onLastSet?"Log Final Set ✓":`Log Set ${activeSetIdx+1} →`}
                      </button>
                      <button className="swap-btn" onClick={()=>setEditExIdx(activeExIdx)}>
                        <span style={{fontSize:"1.1rem"}}>✏️</span><span>Edit</span>
                      </button>
                    </div>
                  </>
                )}

                {/* Done with Exercise button / Failure question */}
                {setsLoggedThisEx > 0 && (
                  showFailureQ ? (
                    <div style={{marginTop:12,background:"#12121e",border:"1.5px solid #f59e0b33",borderRadius:13,padding:"14px 15px"}}>
                      <div style={{fontSize:"0.72rem",fontWeight:700,color:"#f59e0baa",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Last Set Check</div>
                      <div style={{fontSize:"0.92rem",fontWeight:700,color:"#eeeef5",marginBottom:12}}>Did you go to failure on your last set?</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                        <button onClick={()=>confirmDoneExercise(true)}
                          style={{padding:"13px",borderRadius:11,border:"1.5px solid #22c55e44",background:"#0d1a10",color:"#22c55e",fontFamily:"Bebas Neue,sans-serif",fontSize:"1rem",letterSpacing:"0.08em",cursor:"pointer"}}>
                          ✓ Yes
                        </button>
                        <button onClick={()=>confirmDoneExercise(false)}
                          style={{padding:"13px",borderRadius:11,border:"1.5px solid #252538",background:"#12121e",color:"#8888aa",fontFamily:"Bebas Neue,sans-serif",fontSize:"1rem",letterSpacing:"0.08em",cursor:"pointer"}}>
                          ✕ No
                        </button>
                      </div>
                    </div>
                  ) : (
                    <button onClick={doneExercise}
                      style={{width:"100%",marginTop:10,padding:"13px",border:"1.5px solid #22c55e44",borderRadius:12,background:"#0d1a10",color:"#22c55e",fontFamily:"Bebas Neue,sans-serif",fontSize:"1.1rem",letterSpacing:"0.08em",cursor:"pointer"}}>
                      ✓ Done with {ex.name.split(" ").slice(-1)[0]} — Next Exercise →
                    </button>
                  )
                )}
              </div>

              {/* #2 #3 #4 — Full exercise list: completed + upcoming, draggable, with add button */}
              <div className="upcoming-section">
                <div className="label" style={{marginBottom:6}}>All Exercises — tap to jump · hold to reorder</div>
                {session.exercises.map((e,i)=>{
                  const isDone = i < activeExIdx;
                  const isActive = i === activeExIdx;
                  return (
                    <div key={i}
                      className={`upcoming-item${isDone?" completed":""}`}
                      draggable={!isActive}
                      onDragStart={ev=>{ ev.dataTransfer.effectAllowed="move"; ev.dataTransfer.setData("text/plain",String(i)); }}
                      onDragOver={ev=>{ ev.preventDefault(); ev.dataTransfer.dropEffect="move"; }}
                      onDrop={ev=>{
                        ev.preventDefault();
                        const from=parseInt(ev.dataTransfer.getData("text/plain"));
                        if(from===i) return;
                        const exs=[...session.exercises];
                        const [moved]=exs.splice(from,1);
                        exs.splice(i,0,moved);
                        // Remap activeExIdx
                        let newActive=activeExIdx;
                        if(from===activeExIdx) newActive=i;
                        else if(from<activeExIdx&&i>=activeExIdx) newActive=activeExIdx-1;
                        else if(from>activeExIdx&&i<=activeExIdx) newActive=activeExIdx+1;
                        setActiveExIdx(newActive);
                        setSession({...session,exercises:exs});
                      }}
                      style={{cursor:isActive?"default":"pointer",opacity:1,background:isActive?"#f59e0b08":"transparent",borderRadius:isActive?8:0,padding:isActive?"10px 6px":"10px 0"}}
                      onClick={()=>{ if(!isActive) jumpToExercise(i); }}>
                      <div className="drag-handle" onTouchStart={e=>e.stopPropagation()}>⠿</div>
                      <div className="upcoming-num" style={{color:isDone?"#22c55e55":isActive?"#f59e0b":"#44447a"}}>
                        {isDone?"✓":i+1}
                      </div>
                      <div className="upcoming-info" style={{flex:1}}>
                        <div className="upcoming-name" style={{color:isDone?"#22c55e88":isActive?"#eeeef5":"#aaaacc"}}>
                          {e.name}
                          {isActive && <span style={{fontSize:".6rem",color:"#f59e0b",marginLeft:6,fontWeight:700}}>← NOW</span>}
                          {e.customProgram&&<span style={{fontSize:".62rem",color:"#f59e0b88",marginLeft:6}}>📋 {e.customProgram.name}</span>}
                        </div>
                        <div className="upcoming-type">{e.isBigThree?"Big Three":e.compound?"Compound":"Isolation"} · {MUSCLE_GROUPS[e.group]?.icon} {e.group}</div>
                      </div>
                      <div className="upcoming-right">
                        <div className="upcoming-sets">{e.sets}×{e.repRange}</div>
                        {!isActive && <button className="upcoming-swap" onClick={ev=>{ev.stopPropagation();setEditExIdx(i);}}>✏️</button>}
                        {!isActive && <button className="upcoming-swap" style={{color:"#ef444466",borderColor:"#ef444422"}}
                          onClick={ev=>{ev.stopPropagation();handleEditEx({action:"delete",idx:i});}}>✕</button>}
                      </div>
                    </div>
                  );
                })}

                {/* #4 — Add exercise button */}
                <div style={{paddingTop:10,paddingBottom:4}}>
                  {addingExercise ? (
                    <div style={{background:"#12121e",borderRadius:12,padding:"13px",border:"1px solid #252538"}}>
                      <div style={{fontSize:"0.6rem",fontWeight:700,color:"#8888aa",textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:7}}>Add Exercise</div>
                      <input
                        autoFocus
                        value={addExName}
                        onChange={e=>setAddExName(e.target.value)}
                        placeholder="Exercise name..."
                        style={{width:"100%",background:"#0c0c18",border:"1.5px solid #252538",borderRadius:10,color:"#eeeef5",fontFamily:"DM Sans,sans-serif",fontSize:"0.9rem",padding:"10px 12px",marginBottom:8}}
                      />
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:8}}>
                        {[[true,"🏋️","Compound"],[false,"🎯","Isolation"]].map(([val,icon,label])=>(
                          <button key={label} onClick={()=>setAddExCompound(val)}
                            style={{padding:"8px",borderRadius:9,border:`1.5px solid ${addExCompound===val?"#f59e0b":"#252538"}`,background:addExCompound===val?"#f59e0b0e":"#14141f",color:addExCompound===val?"#f59e0b":"#8888aa",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.78rem",cursor:"pointer"}}>
                            {icon} {label}
                          </button>
                        ))}
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                        <button onClick={()=>{setAddingExercise(false);setAddExName("");}}
                          style={{padding:"10px",borderRadius:10,border:"1px solid #252538",background:"#14141f",color:"#8888aa",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.82rem",cursor:"pointer"}}>
                          Cancel
                        </button>
                        <button disabled={!addExName.trim()} onClick={()=>{
                            if(!addExName.trim()) return;
                            const group = session.exercises[activeExIdx]?.group || "Chest";
                            const newEx = {name:addExName.trim(),compound:addExCompound,group,sets:addExCompound?4:3,repRange:addExCompound?"6–10":"10–15",alts:[],customProgram:null,isBigThree:false,suggestion:getSuggestion({name:addExName.trim()},allLogs,addExCompound)};
                            saveCustomExercise(group,addExName.trim(),addExCompound);
                            setSession({...session,exercises:[...session.exercises,newEx],totalSets:session.totalSets+(addExCompound?4:3),estMinutes:Math.round((session.totalSets+(addExCompound?4:3))*3.5)});
                            setAddingExercise(false);setAddExName("");
                          }}
                          style={{padding:"10px",borderRadius:10,border:"none",background:addExName.trim()?"linear-gradient(135deg,#f59e0b,#ef4444)":"#14141f",color:addExName.trim()?"#fff":"#2a2a40",fontFamily:"Bebas Neue,sans-serif",fontSize:"0.95rem",letterSpacing:"0.06em",cursor:addExName.trim()?"pointer":"default"}}>
                          Add →
                        </button>
                      </div>
                    </div>
                  ) : (
                    <button onClick={()=>setAddingExercise(true)}
                      style={{width:"100%",padding:"11px",border:"1.5px dashed #252538",borderRadius:11,background:"transparent",color:"#7777aa",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.82rem",cursor:"pointer",letterSpacing:"0.04em"}}>
                      + Add Another Exercise
                    </button>
                  )}
                </div>
              </div>
            </>
          );
        })()}

        {/* ── SESSION COMPLETE ── */}
        {screen==="session" && sessionComplete && (
          <div className="complete-wrap">
            <div className="complete-icon">🔥</div>
            <div className="complete-title">Session Complete!</div>
            <div className="complete-sub">All sets logged. PRs and overload targets updated for next time.</div>
            <div className="complete-stats">
              <div><div className="c-stat-val">{session.exercises.length}</div><div className="c-stat-label">Exercises</div></div>
              <div><div className="c-stat-val">{session.totalSets}</div><div className="c-stat-label">Total Sets</div></div>
              <div><div className="c-stat-val">~{session.estMinutes}</div><div className="c-stat-label">Minutes</div></div>
            </div>
            {newPRs.length>0&&(
              <div className="pr-earned">
                <div className="pr-earned-title">🔥 New PRs This Session</div>
                {newPRs.map(n=><div key={n} className="pr-earned-item">· {n}</div>)}
              </div>
            )}
            <button className="done-btn" onClick={()=>{setScreen("home");setSelectedGroups([]);setSelectedBigThree([]);}}>Back to Home</button>
          </div>
        )}

        {/* ── HISTORY ── */}
        {screen==="history" && (()=>{
          // Build session groups: key = "title|||date"
          const sessionMap = {};
          Object.entries(allLogs).forEach(([ex, logs]) => {
            logs.forEach((l, i) => {
              const title = l.sessionTitle || "Workout";
              const key   = `${title}|||${l.date}`;
              if (!sessionMap[key]) sessionMap[key] = { title, date: l.date, exercises: [] };
              sessionMap[key].exercises.push({ exercise: ex, ...l, _logIdx: i });
            });
          });
          const sessionList = Object.entries(sessionMap)
            .sort((a,b) => {
              // sort by date desc (parse "12 Jan 2025")
              const da = new Date(a[1].date); const db = new Date(b[1].date);
              return db - da;
            });

          return (
            <div className="section">
              {/* View toggle */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:14}}>
                {[["sessions","📅 By Session"],["exercises","🏋️ By Exercise"]].map(([v,label])=>(
                  <button key={v} onClick={()=>setHistoryView(v)}
                    style={{padding:"9px",borderRadius:10,border:`1.5px solid ${historyView===v?"#f59e0b":"#252538"}`,background:historyView===v?"#f59e0b0e":"#12121e",color:historyView===v?"#f59e0b":"#8888aa",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.78rem",cursor:"pointer",transition:"all .15s"}}>
                    {label}
                  </button>
                ))}
              </div>

              {/* ── BY SESSION ── */}
              {historyView==="sessions" && (
                sessionList.length===0
                  ? <div className="empty">No sessions yet.<br/>Build your first session! 💪</div>
                  : sessionList.map(([key, s])=>{
                    const isExpanded = expandedSession === key;
                    const groups = [...new Set(s.exercises.map(e=>e.muscleGroup).filter(Boolean))];
                    return (
                      <div key={key} style={{marginBottom:10}}>
                        {/* Session header row */}
                        <div
                          onClick={()=>setExpandedSession(isExpanded?null:key)}
                          style={{background:"#12121e",borderRadius:isExpanded?"13px 13px 0 0":13,border:"1px solid #252538",borderBottom:isExpanded?"1px solid #1a1a2a":"1px solid #252538",padding:"13px 15px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:700,fontSize:"0.95rem",color:"#eeeef5",marginBottom:3}}>{s.title}</div>
                            <div style={{fontSize:"0.68rem",color:"#7777aa",display:"flex",gap:8,flexWrap:"wrap"}}>
                              <span>📅 {s.date}</span>
                              <span>{s.exercises.length} exercises</span>
                              {groups.map(g=><span key={g}>{MUSCLE_GROUPS[g]?.icon} {g}</span>)}
                            </div>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <button
                              onClick={ev=>{ev.stopPropagation(); setConfirmDeleteSession(key);}}
                              style={{padding:"5px 9px",borderRadius:7,border:"1px solid #ef444433",background:"none",color:"#ef444466",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.7rem",cursor:"pointer"}}>
                              🗑
                            </button>
                            <div style={{color:"#7777aa",fontSize:"0.85rem"}}>{isExpanded?"▲":"▼"}</div>
                          </div>
                        </div>

                        {/* Expanded exercise list */}
                        {isExpanded && (
                          <div style={{background:"#0e0e18",border:"1px solid #252538",borderTop:"none",borderRadius:"0 0 13px 13px",padding:"10px 15px 14px"}}>
                            {s.exercises.map((e,i)=>{
                              const vs=(e.sets||[]).filter(s=>s.weight&&s.reps);
                              const best=vs.length>0?Math.max(...vs.map(s=>parseFloat(s.weight)*(1+parseInt(s.reps)/30))):0;
                              const isPR=best>0&&prs[e.exercise]&&Math.abs(best-prs[e.exercise])<.01;
                              return (
                                <div key={i} style={{paddingTop:10,paddingBottom:10,borderBottom:i<s.exercises.length-1?"1px solid #1a1a28":"none"}}>
                                  <div style={{fontWeight:700,fontSize:"0.88rem",color:"#ddddee",marginBottom:4}}>
                                    {e.exercise}{isPR&&<span className="pr-badge">PR 🔥</span>}
                                  </div>
                                  <div style={{display:"flex",gap:8,marginBottom:5,fontSize:"0.65rem",color:"#7777aa",flexWrap:"wrap"}}>
                                    <span>{MUSCLE_GROUPS[e.muscleGroup]?.icon} {e.muscleGroup}</span>
                                    {e.program&&<span className="h-prog-tag">📋 {e.program}</span>}
                                    <span>{e.sets?.length} sets</span>
                                  </div>
                                  <div className="h-sets">
                                    {(e.sets||[]).map((s,j)=>(
                                      <div className="h-chip" key={j}><strong>{s.reps}</strong> × <strong>{s.weight}</strong>lbs</div>
                                    ))}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        )}

                        {/* Delete confirm */}
                        {confirmDeleteSession===key && (
                          <div style={{background:"#1a0a0a",border:"1px solid #ef444433",borderRadius:10,padding:"12px 14px",marginTop:6}}>
                            <div style={{fontSize:"0.82rem",color:"#ef4444aa",fontWeight:600,marginBottom:10}}>Delete this entire session? This can't be undone.</div>
                            <div style={{display:"flex",gap:8}}>
                              <button onClick={()=>deleteFullSession(key)}
                                style={{flex:1,padding:"9px",background:"#ef444422",border:"1px solid #ef444444",borderRadius:9,color:"#ef4444",fontWeight:700,fontSize:"0.82rem",cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
                                Yes, Delete
                              </button>
                              <button onClick={()=>setConfirmDeleteSession(null)}
                                style={{flex:1,padding:"9px",background:"#14141f",border:"1px solid #252538",borderRadius:9,color:"#8888aa",fontWeight:700,fontSize:"0.82rem",cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
                                Cancel
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })
              )}

              {/* ── BY EXERCISE ── */}
              {historyView==="exercises" && (
                <>
                  <div className="filter-scroll">
                    {["All",...ALL_GROUPS].map(g=>(
                      <button key={g} className={`filter-chip${historyFilter===g?" active":""}`} onClick={()=>setHistoryFilter(g)}>
                        {g==="All"?"All":`${MUSCLE_GROUPS[g].icon} ${g}`}
                      </button>
                    ))}
                  </div>
                  {filteredHistory.length===0
                    ? <div className="empty">No sessions yet.<br/>Build your first session! 💪</div>
                    : filteredHistory.map((entry,i)=>{
                      const vs=(entry.sets||[]).filter(s=>s.weight&&s.reps);
                      const best=vs.length>0?Math.max(...vs.map(s=>parseFloat(s.weight)*(1+parseInt(s.reps)/30))):0;
                      const isPR=best>0&&prs[entry.exercise]&&Math.abs(best-prs[entry.exercise])<.01;
                      return (
                        <div className="h-card" key={i}>
                          <div className="h-name">{entry.exercise}{isPR&&<span className="pr-badge">PR 🔥</span>}</div>
                          <div className="h-meta">
                            <span>{entry.date}</span>
                            <span>{MUSCLE_GROUPS[entry.muscleGroup]?.icon} {entry.muscleGroup}</span>
                            {entry.sessionTitle&&<span style={{color:"#aaaacc",fontWeight:600}}>{entry.sessionTitle}</span>}
                            {entry.program&&<span className="h-prog-tag">📋 {entry.program}</span>}
                            <span>{entry.sets?.length} sets</span>
                          </div>
                          <div className="h-sets">{(entry.sets||[]).map((s,j)=><div className="h-chip" key={j}><strong>{s.reps}</strong> × <strong>{s.weight}</strong>lbs</div>)}</div>
                        </div>
                      );
                    })
                  }
                </>
              )}
            </div>
          );
        })()}

        {/* ── PRs ── */}
        {screen==="prs" && (
          <div className="section">
            {prEntries.length===0 ? <div className="empty">No PRs yet.<br/>Complete a session to start tracking! 🏋️</div>
              : ALL_GROUPS.map(group=>{
                const gPRs=prEntries.filter(([ex])=>getMG(ex)===group);
                if(!gPRs.length) return null;
                return (
                  <div key={group}>
                    <div className="pr-sec-label">{MUSCLE_GROUPS[group].icon} {group}</div>
                    {gPRs.map(([ex,val])=>{
                      const isOpen = prGraphEx === ex;
                      const hist   = prHistory[ex] || [];
                      // Build graph points
                      const W=320, H=110, PAD=10;
                      const vals = hist.map(p=>p.oneRM);
                      const minV = vals.length>1 ? Math.min(...vals) : 0;
                      const maxV = vals.length>1 ? Math.max(...vals) : val;
                      const range = maxV - minV || 1;
                      const pts = hist.map((p,i)=>{
                        const x = PAD + (i/(Math.max(hist.length-1,1)))*(W-PAD*2);
                        const y = PAD + (1-(p.oneRM-minV)/range)*(H-PAD*2);
                        return {x,y,oneRM:p.oneRM,date:p.date,failure:p.wentToFailure};
                      });
                      const pathD = pts.length>1
                        ? "M"+pts.map(p=>`${p.x},${p.y}`).join(" L")
                        : null;

                      return (
                        <div key={ex} style={{marginBottom:8}}>
                          <div className="pr-card" onClick={()=>setPrGraphEx(isOpen?null:ex)} style={{cursor:"pointer",borderRadius:isOpen?"13px 13px 0 0":13}}>
                            <div>
                              <div className="pr-name">{ex}</div>
                              <div className="pr-sub">{hist.length>0?`${hist.length} data point${hist.length>1?"s":""}  · tap for graph`:"Est. 1-Rep Max · tap for graph"}</div>
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                              <div style={{textAlign:"right"}}>
                                <div className="pr-val">{val.toFixed(1)}</div>
                                <div className="pr-sub">lbs</div>
                              </div>
                              <div style={{color:"#7777aa",fontSize:"0.8rem"}}>{isOpen?"▲":"▼"}</div>
                            </div>
                          </div>

                          {isOpen && (
                            <div style={{background:"#0e0e14",border:"1px solid #f59e0b1c",borderTop:"none",borderRadius:"0 0 13px 13px",padding:"14px 15px 16px"}}>
                              {hist.length < 2 ? (
                                <div style={{textAlign:"center",color:"#44447a",fontSize:"0.82rem",padding:"12px 0"}}>
                                  Need at least 2 data points to show a graph.<br/>
                                  <span style={{fontSize:"0.72rem",color:"#33335a"}}>Answer the failure question after sets to log 1RM data.</span>
                                </div>
                              ) : (
                                <>
                                  <div style={{fontSize:"0.62rem",fontWeight:700,color:"#f59e0b88",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Estimated 1RM Over Time</div>
                                  <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible"}}>
                                    {/* Grid lines */}
                                    {[0,.5,1].map(t=>{
                                      const y=PAD+(1-t)*(H-PAD*2);
                                      const v=minV+t*range;
                                      return <g key={t}>
                                        <line x1={PAD} y1={y} x2={W-PAD} y2={y} stroke="#1e1e2e" strokeWidth="1"/>
                                        <text x={PAD} y={y-3} fill="#44447a" fontSize="8" fontFamily="DM Sans,sans-serif">{v.toFixed(0)}lbs</text>
                                      </g>;
                                    })}
                                    {/* Line */}
                                    {pathD && <path d={pathD} fill="none" stroke="#f59e0b" strokeWidth="2" strokeLinejoin="round"/>}
                                    {/* Area fill */}
                                    {pathD && pts.length>1 && (
                                      <path d={pathD+` L${pts[pts.length-1].x},${H-PAD} L${pts[0].x},${H-PAD} Z`}
                                        fill="url(#prGrad)" opacity="0.18"/>
                                    )}
                                    <defs>
                                      <linearGradient id="prGrad" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="0%" stopColor="#f59e0b"/>
                                        <stop offset="100%" stopColor="#f59e0b" stopOpacity="0"/>
                                      </linearGradient>
                                    </defs>
                                    {/* Data points */}
                                    {pts.map((p,i)=>(
                                      <g key={i}>
                                        <circle cx={p.x} cy={p.y} r="4" fill={p.failure?"#f59e0b":"#ef4444"} stroke="#080810" strokeWidth="1.5"/>
                                        {i===pts.length-1 && (
                                          <text x={p.x} y={p.y-8} fill="#f59e0b" fontSize="9" textAnchor="middle" fontFamily="DM Sans,sans-serif" fontWeight="700">{p.oneRM}lbs</text>
                                        )}
                                      </g>
                                    ))}
                                  </svg>
                                  {/* X axis dates */}
                                  <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:"0.6rem",color:"#44447a"}}>
                                    <span>{hist[0].date}</span>
                                    <span>{hist[hist.length-1].date}</span>
                                  </div>
                                  <div style={{display:"flex",gap:14,marginTop:10,fontSize:"0.65rem",color:"#7777aa"}}>
                                    <span><span style={{color:"#f59e0b"}}>●</span> To failure</span>
                                    <span><span style={{color:"#ef4444"}}>●</span> Estimated</span>
                                  </div>
                                  {/* Recent data points */}
                                  <div style={{marginTop:12,display:"flex",flexDirection:"column",gap:5}}>
                                    {[...hist].reverse().slice(0,5).map((p,i)=>(
                                      <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:"0.72rem",color:"#7777aa",padding:"4px 0",borderBottom:"1px solid #1a1a28"}}>
                                        <span>{p.date}</span>
                                        <span style={{color:"#f59e0b",fontWeight:700}}>{p.oneRM} lbs {p.wentToFailure?"🔥":""}</span>
                                      </div>
                                    ))}
                                  </div>
                                </>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
          </div>
        )}

        {/* ── DATA ── */}
        {screen==="data" && (
          <div className="section" style={{paddingTop:8}}>
            <div style={{background:"#0e0e1c",borderRadius:16,padding:"18px 16px",marginBottom:12,border:"1px solid #18182c"}}>
              <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"#3a3a58",marginBottom:6}}>Backup Your Data</div>
              <div style={{fontSize:"0.82rem",color:"#44445a",lineHeight:1.6,marginBottom:14}}>
                Downloads a JSON file with all your workout logs, PRs, programs, and custom exercises. Keep this somewhere safe — iCloud, email, Notes, anywhere.
              </div>
              <div style={{display:"flex",gap:10,marginBottom:10,fontSize:"0.72rem",color:"#3a3a58",flexWrap:"wrap"}}>
                <span>📋 {Object.keys(allLogs).length} exercises logged</span>
                <span>🏆 {Object.keys(prs).length} PRs tracked</span>
                <span>📅 {Object.values(allLogs).reduce((a,v)=>a+v.length,0)} total sessions</span>
              </div>
              <button onClick={exportData}
                style={{width:"100%",padding:"14px",border:"none",borderRadius:12,background:"linear-gradient(135deg,#f59e0b,#ef4444)",color:"#fff",fontFamily:"Bebas Neue,sans-serif",fontSize:"1.15rem",letterSpacing:"0.1em",cursor:"pointer"}}>
                ⬇ Export Backup
              </button>
            </div>

            <div style={{background:"#0e0e1c",borderRadius:16,padding:"18px 16px",border:"1px solid #18182c"}}>
              <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"#3a3a58",marginBottom:6}}>Restore From Backup</div>
              <div style={{fontSize:"0.82rem",color:"#44445a",lineHeight:1.6,marginBottom:14}}>
                Open your backup JSON file, select all the text, and paste it below. This will overwrite your current data.
              </div>

              {!showImport ? (
                <button onClick={()=>setShowImport(true)}
                  style={{width:"100%",padding:"13px",border:"1.5px solid #1e1e2e",borderRadius:12,background:"#14141f",color:"#44445a",fontFamily:"Bebas Neue,sans-serif",fontSize:"1rem",letterSpacing:"0.1em",cursor:"pointer"}}>
                  ⬆ Import Backup
                </button>
              ) : (
                <>
                  <textarea
                    value={importText}
                    onChange={e=>setImportText(e.target.value)}
                    placeholder='Paste your backup JSON here...'
                    style={{width:"100%",minHeight:120,background:"#0c0c18",border:"1.5px solid #18182c",borderRadius:11,color:"#eeeef5",fontFamily:"DM Sans,sans-serif",fontSize:"0.82rem",padding:"12px",resize:"vertical",marginBottom:10}}
                  />
                  {importStatus==="ok" && (
                    <div style={{background:"#0d1a10",border:"1px solid #22c55e33",borderRadius:10,padding:"10px 14px",marginBottom:10,fontSize:"0.82rem",color:"#22c55e",fontWeight:700}}>
                      ✓ Data restored successfully!
                    </div>
                  )}
                  {importStatus==="error" && (
                    <div style={{background:"#1a0a0a",border:"1px solid #ef444433",borderRadius:10,padding:"10px 14px",marginBottom:10,fontSize:"0.82rem",color:"#ef4444",fontWeight:700}}>
                      ✕ Invalid backup file — check the JSON and try again.
                    </div>
                  )}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
                    <button onClick={()=>{setShowImport(false);setImportText("");setImportStatus(null);}}
                      style={{padding:"12px",border:"1px solid #1e1e2e",borderRadius:11,background:"#14141f",color:"#44445a",fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:"0.82rem",cursor:"pointer"}}>
                      Cancel
                    </button>
                    <button disabled={!importText.trim()} onClick={importData}
                      style={{padding:"12px",border:"none",borderRadius:11,background:importText.trim()?"linear-gradient(135deg,#f59e0b,#ef4444)":"#14141f",color:importText.trim()?"#fff":"#2a2a40",fontFamily:"Bebas Neue,sans-serif",fontSize:"1rem",letterSpacing:"0.08em",cursor:importText.trim()?"pointer":"default"}}>
                      Restore →
                    </button>
                  </div>
                </>
              )}
            </div>

            <div style={{marginTop:16,padding:"14px 16px",background:"#0a0a14",borderRadius:12,border:"1px dashed #1a1a2e"}}>
              <div style={{fontSize:"0.65rem",color:"#28284a",lineHeight:1.7}}>
                💡 <strong style={{color:"#3a3a58"}}>Tip:</strong> Export a backup before reinstalling the app or switching phones. Your data lives on this device only — it's not synced to the cloud.
              </div>
            </div>
          </div>
        )}

        {/* ── EDIT EXERCISE SHEET ── */}
        {editExIdx!==null&&session&&(()=>{
          const ex = session.exercises[editExIdx];
          const group = ex.group;
          const builtIn = (MUSCLE_GROUPS[group]?.exercises || []);
          const custom  = (customExercises[group] || []).filter(c=>!builtIn.find(b=>b.name===c.name));
          const groupExercises = [...builtIn, ...custom];
          return (
            <EditExSheet
              exercise={ex}
              idx={editExIdx}
              onAction={handleEditEx}
              onClose={()=>setEditExIdx(null)}
              groupExercises={groupExercises}
            />
          );
        })()}

        {/* ── PROGRAM SHEET ── */}
        {programKey!==null&&(
          <ProgramSheet
            b3key={programKey}
            existing={customPrograms[programKey]||null}
            onSave={prog=>saveProgram(programKey,prog)}
            onDelete={()=>deleteProgram(programKey)}
            onClose={()=>setProgramKey(null)}
          />
        )}

      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GymTracker />);
  </script>

  <!-- Service Worker registration for offline support -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Inline service worker as blob
        const swCode = `
          const CACHE = 'ironlog-v1';
          const ASSETS = ['/'];
          self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
          });
          self.addEventListener('fetch', e => {
            e.respondWith(
              caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('/')))
            );
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl);
      });
    }
  </script>
